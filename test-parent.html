<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI-Fusang 测试父窗口（V4 postMessage）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;}
.header{background:#16213e;padding:12px 20px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:20px;}
.header h1{font-size:18px;color:#00d4ff;margin:0;white-space:nowrap;}
.header .subtitle{font-size:12px;color:#8b949e;white-space:nowrap;}
.main{display:flex;flex:1;overflow:hidden;}
.left{flex:1;position:relative;}
.left iframe{width:100%;height:100%;border:none;}
.right{width:220px;background:#0d1117;border-left:1px solid #30363d;display:flex;flex-direction:column;min-width:0;}
.panel{padding:8px 12px;border-bottom:1px solid #30363d;}
.panel h3{font-size:12px;color:#58a6ff;margin:0 0 6px 0;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;}
.panel h3 .arrow{font-size:10px;transition:transform 0.15s;}
.panel h3 .arrow.open{transform:rotate(90deg);}
.log{font-family:'JetBrains Mono',monospace;font-size:11px;background:#161b22;padding:6px 8px;border-radius:4px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;flex:1;min-height:0;}
.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;margin:2px 2px 2px 0;display:inline-block;transition:all 0.15s;}
.btn:hover{background:#30363d;}
.btn-primary{background:#0066cc;color:#fff;border-color:#0066cc;}
.btn-primary:hover{background:#0052a3;}
.btn-primary.pressed{background:#1a3a5c;color:#7ab3e0;border-color:#1a4a6c;}
.btn-primary.pressed::after{content:' ✓';margin-left:2px;}
.status{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;}
.status.signal-on{background:#3fb950;box-shadow:0 0 6px rgba(63,185,80,0.4);}
.status.signal-off{background:#6e7681;}
.status.connected{background:#3fb950;box-shadow:0 0 6px rgba(63,185,80,0.4);}
.status.disconnected{background:#6e7681;}
/* 工业风状态栏 */
.status-bar{display:flex;align-items:center;gap:6px;font-size:11px;white-space:nowrap;}
.status-bar .stage{display:flex;align-items:center;gap:6px;background:rgba(22,27,34,0.6);border:1px solid #30363d;border-radius:4px;padding:3px 10px;}
.status-bar .stage-label{color:#8b949e;font-size:10px;white-space:nowrap;}
/* 工业风开关 */
.switch-btn{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;border:1px solid #30363d;transition:all 0.15s;font-family:inherit;white-space:nowrap;}
.switch-btn.off{background:#161b22;color:#8b949e;}
.switch-btn.on{background:#0d2818;color:#3fb950;border-color:#3fb950;box-shadow:0 0 6px rgba(63,185,80,0.25);}
.switch-btn:disabled{opacity:0.25;cursor:not-allowed;}
.switch-btn .toggle-text{font-weight:bold;letter-spacing:1px;}
</style>
</head>
<body>

<div class="header">
  <h1>🎯 AI-Fusang 测试父窗口</h1>
  <span class="subtitle">V4 postMessage 集成测试</span>
  <div class="status-bar" style="margin-left:auto;">
    <div class="stage">
      <span class="status signal-off" id="detect-dot"></span>
      <span class="stage-label">信号</span>
    </div>
    <div class="stage">
      <span class="stage-label">外接信号</span>
      <button class="switch-btn off" id="switch-btn" onclick="toggleSwitch()" disabled>
        <span class="toggle-text" id="switch-text">OFF</span>
      </button>
    </div>
    <div class="stage">
      <span class="status disconnected" id="connect-dot"></span>
      <span class="stage-label">连接</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="left">
    <iframe id="fusang-iframe"></iframe>
  </div>

  <div class="right">
    <div class="panel">
      <h3>🎮 控制面板</h3>
      <!-- 节点选择 -->
      <div style="margin-bottom:6px;display:flex;gap:4px;align-items:center;">
        <span style="font-size:10px;color:#8b949e;white-space:nowrap;">节点</span>
        <select id="node-select" style="flex:1;background:#161b22;color:#c9d1d9;border:1px solid #30363d;border-radius:3px;padding:2px 4px;font-size:11px;font-family:inherit;"></select>
      </div>
      <!-- 搭建/故障 -->
      <div style="margin-bottom:4px;font-size:10px;color:#58a6ff;">─ 搭建 ─</div>
      <div id="build-btns" style="margin-bottom:6px;display:flex;gap:3px;">
        <button class="btn" onclick="sendSetStatus('done')" style="font-size:10px;background:#2ea043;color:#fff;border-color:#2ea043;">🟢搭建</button>
        <button class="btn" onclick="sendInjectFault()" style="font-size:10px;background:#e53935;color:#fff;border-color:#e53935;">🔴故障</button>
      </div>
      <!-- 修复 -->
      <div style="margin-bottom:4px;font-size:10px;color:#58a6ff;">─ 修复 ─</div>
      <div id="fix-btns" style="margin-bottom:6px;display:flex;gap:3px;">
        <button class="btn" onclick="sendAIFix()" style="font-size:10px;background:#00b365;color:#fff;border-color:#00b365;">🤖AI修复</button>
        <button class="btn" onclick="sendManualFix()" style="font-size:10px;background:#f5a623;color:#fff;border-color:#f5a623;">✋人工修复</button>
      </div>
    </div>

    <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:0;">
      <h3>📋 消息日志 <span style="float:right;font-size:10px;color:#8b949e;cursor:pointer;" onclick="clearLog()">[🗑️清空]</span></h3>
      <div class="log" id="message-log"></div>
    </div>

    <div class="panel" style="padding:0;">
      <h3 onclick="toggleHelp()" style="padding:8px 12px;"><span class="arrow" id="help-arrow">▶</span> ℹ️ 使用说明</h3>
      <div id="help-body" style="display:none;padding:0 12px 8px 20px;">
        <ul style="font-size:11px;color:#8b949e;line-height:1.5;">
          <li>左侧是扶桑树 iframe</li>
          <li>点击节点 → 观察消息日志</li>
          <li>点「高亮」按钮 → 观察扶桑树节点闪烁</li>
          <li>扶桑树加载完成后会自动发送 READY</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<script>
var iframe = document.getElementById('fusang-iframe');
var logEl = document.getElementById('message-log');
var detectDot = document.getElementById('detect-dot');
var connectDot = document.getElementById('connect-dot');
var switchBtn = document.getElementById('switch-btn');
var switchText = document.getElementById('switch-text');
var SECRET = 'fusang-2026';

var signalDetected = false;  // 是否检测到扶桑树信号
var switchOn = false;        // 外接信号开关是否打开

// 动态设置 iframe src，加时间戳防缓存
iframe.src = 'index.html?_cb=' + Date.now();

// 日志记录
function log(msg) {
  var time = new Date().toLocaleTimeString('zh-CN');
  logEl.innerHTML += '[' + time + '] ' + msg + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
  logEl.innerHTML = '';
  log('日志已清空');
}

// ====== 三段式状态管理 ======

// 1. 信号检测器：被动检测扶桑树就绪信号
function setSignalDetected(detected) {
  if(detected){
    signalDetected=true;
    detectDot.className='status signal-on';
    // 有信号了 → 开关可用
    switchBtn.disabled=false;
    log('  → 🔍 信号检测：扶桑树已就绪，等待用户开启外接信号开关');
  }else{
    signalDetected=false;
    detectDot.className='status signal-off';
    switchBtn.disabled=true;
    if(!switchOn) setConnected(false);
  }
}

// 2. 外接信号开关：用户控制是否接入
function toggleSwitch() {
  if(!signalDetected) return; // 无信号不可操作
  switchOn=!switchOn;
  if(switchOn){
    // 开 → 向扶桑树发送 READY，启用接入
    switchBtn.className='switch-btn on';
    switchText.textContent='ON';
    iframe.contentWindow.postMessage({type:'FUSANG_READY',secret:SECRET},'*');
    log('🔛 外接信号开关 → ON（已向扶桑树发送 READY）');
    setConnected(true);
    // 允许控制面板其他按钮操作
    enableControls(true);
  }else{
    // 关 → 断开连接，通知扶桑树
    switchBtn.className='switch-btn off';
    switchText.textContent='OFF';
    iframe.contentWindow.postMessage({type:'FUSANG_DISCONNECT',secret:SECRET},'*');
    log('🔛 外接信号开关 → OFF（已通知扶桑树断开）');
    setConnected(false);
    enableControls(false);
  }
}

// 3. 已连接状态
function setConnected(conn) {
  if(conn){
    connectDot.className='status connected';
    log('  → ✅ 与扶桑树已连接');
  }else{
    connectDot.className='status disconnected';
    log('  → ❌ 与扶桑树已断开');
  }
}

// 获取下拉选中的节点ID
function getSelectedNode(){
  var sel=document.getElementById('node-select');
  return sel?sel.value:'entry';
}

// 填充节点下拉列表
var allNodeIds=['entry','config','db','cache','api','auth','frontend','tests','ci'];
function populateNodes(){
  var sel=document.getElementById('node-select');
  if(!sel) return;
  var labels={'entry':'entry 程序入口','config':'config 配置','db':'db 数据库','cache':'cache 缓存','api':'api API服务','auth':'auth 认证','frontend':'frontend 前端','tests':'tests 测试','ci':'ci 部署'};
  sel.innerHTML='';
  allNodeIds.forEach(function(id){
    var opt=document.createElement('option');
    opt.value=id;
    opt.textContent=labels[id]||id;
    sel.appendChild(opt);
  });
}

// 启用/禁用控制面板
function enableControls(on){
  ['build-btns','fix-btns'].forEach(function(id){
    var container=document.getElementById(id);
    if(!container) return;
    var btns=container.querySelectorAll('button');
    btns.forEach(function(b){
      b.disabled=!on;
      b.style.opacity=on?'1':'0.4';
      b.style.cursor=on?'pointer':'not-allowed';
    });
  });
}

// 通用：发送 FUSANG_SET_STATUS
function sendSetStatus(status){
  var nodeId=getSelectedNode();
  var statusLabels={'done':'🟢接通','blocked':'🔴故障','in-progress':'🔵进行中','todo':'⚫待办'};
  iframe.contentWindow.postMessage({type:'FUSANG_SET_STATUS',nodeId:nodeId,status:status,secret:SECRET},'*');
  log('✉️ 设置状态 '+nodeId+' → '+ (statusLabels[status]||status));
}

// 发送 FUSANG_INJECT_FAULT
function sendInjectFault(){
  var nodeId=getSelectedNode();
  iframe.contentWindow.postMessage({type:'FUSANG_INJECT_FAULT',nodeId:nodeId,secret:SECRET},'*');
  log('✉️ 注入故障：'+nodeId);
}

// 发送 FUSANG_AI_FIX
function sendAIFix(){
  var nodeId=getSelectedNode();
  iframe.contentWindow.postMessage({type:'FUSANG_AI_FIX',nodeId:nodeId,secret:SECRET},'*');
  log('✉️ AI修复：'+nodeId);
}

// 发送 FUSANG_MANUAL_FIX
function sendManualFix(){
  var nodeId=getSelectedNode();
  iframe.contentWindow.postMessage({type:'FUSANG_MANUAL_FIX',nodeId:nodeId,secret:SECRET},'*');
  log('✉️ 人工修复：'+nodeId);
}

// 发送 FUSANG_HIGHLIGHT_NODE
function sendHighlight(){
  var nodeId=getSelectedNode();
  iframe.contentWindow.postMessage({type:'FUSANG_HIGHLIGHT_NODE',nodeId:nodeId,secret:SECRET},'*');
  log('✉️ 高亮节点：'+nodeId);
}

// 监听扶桑树消息
window.addEventListener('message', function(event) {
  log('📨 收到消息：' + JSON.stringify(event.data, null, 2));

  if (event.data.type === 'FUSANG_NODE_CLICK') {
    log('  → 节点点击：' + event.data.nodeId);
    if (event.data.codeLocation) {
      log('  → 代码位置：' + event.data.codeLocation.file + ':' + event.data.codeLocation.line);
    }
  }

  if (event.data.type === 'FUSANG_READY') {
    // 只点亮信号检测器，不自动转发！等用户开关
    setSignalDetected(true);
    log('  → 🟢 检测到扶桑树就绪信号，等待用户开启外接信号开关');
  }
});

// 页面加载完成
log('测试父窗口已加载');
log('等待扶桑树 iframe 加载...');
// 填充节点下拉
populateNodes();
log('节点列表已加载 ('+allNodeIds.length+' 个)');
// 初始状态：控制面板禁用（等开关打开后才可用）
enableControls(false);

// 使用说明折叠/展开
function toggleHelp(){
  var body=document.getElementById('help-body');
  var arrow=document.getElementById('help-arrow');
  if(body.style.display==='none'){
    body.style.display='block';
    arrow.classList.add('open');
  }else{
    body.style.display='none';
    arrow.classList.remove('open');
  }
}
</script>

</body>
</html>
