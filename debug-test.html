<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>iframe 测试诊断</title></head>
<body style="background:#1a1a2e;color:#e0e0e0;font-family:sans-serif;">
<h2>🔍 iframe 加载诊断</h2>
<div id="status" style="color:#f5a623;">检查中...</div>
<iframe id="test-frame" width="100%" height="600" style="border:1px solid #30363d;background:#0d1117;"></iframe>
<script>
var statusEl = document.getElementById('status');
var iframe = document.getElementById('test-frame');

// 先设置 onload 再设置 src
iframe.onload = function() {
  statusEl.textContent = '✅ iframe 加载成功! 内容高度: ' + (iframe.contentDocument?.body?.innerHTML?.length || 0) + ' 字符';
  statusEl.style.color = '#3fb950';
  try {
    var doc = iframe.contentDocument || iframe.contentWindow.document;
    statusEl.textContent += ' | h1: ' + (doc.querySelector('h1')?.textContent || '无h1');
  } catch(e) {
    statusEl.textContent += ' | 无法读取内容 (跨域限制)';
  }
};

iframe.onerror = function() {
  statusEl.textContent = '❌ iframe 加载失败';
  statusEl.style.color = '#f85149';
};

iframe.src = 'index.html?_cb=' + Date.now();
statusEl.textContent = '🔄 正在加载 index.html... iframe.src = ' + iframe.src;
</script>
</body>
</html>
