// ====== 图例面板 ======
function drawLegend(){
  // 折叠按钮
  var lbl=i18n[lang].legendBtn||'图例';
  var lx=10, ly=H-34, lw=48, lh=20;
  ctx.fillStyle='rgba(22,27,34,0.9)';
  ctx.beginPath();
  ctx.roundRect(lx,ly,lw,lh,4);
  ctx.fill();
  ctx.strokeStyle='#30363d';
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.fillStyle='#8b949e';
  ctx.font='9px sans-serif';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillText(legendExpanded?'\u2716 '+lbl:'\u2630 '+lbl,lx+5,ly+lh/2);

  if(!legendExpanded) return;

  // 展开面板 — 超紧凑
  var mainItems=i18n[lang].legendItems;
  var statusItems=i18n[lang].legendStatus||[];
  // 状态区只占1行（内联色块）
  var totalRows=mainItems.length+(statusItems.length>0?2:0); // +1 sep +1 status-line
  var ROW_H=16;
  var panelW=220, panelH=totalRows*ROW_H+12;
  var px=lx, py=ly-panelH;

  ctx.fillStyle='rgba(22,27,34,0.95)';
  ctx.beginPath();
  ctx.roundRect(px,py,panelW,panelH,6);
  ctx.fill();
  ctx.strokeStyle='#30363d';
  ctx.lineWidth=1;
  ctx.stroke();

  // 标题
  ctx.fillStyle='#e6edf3';
  ctx.font='bold 9px -apple-system,PingFang SC,sans-serif';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText(i18n[lang].legendTitle, px+6, py+3);

  var row=0;
  // 神树要件条目
  mainItems.forEach(function(item,i){
    var iy=py+13+row*ROW_H;
    ctx.font='11px sans-serif';
    ctx.textAlign='left';
    ctx.textBaseline='middle';
    ctx.fillText(item.icon,px+6,iy+8);
    ctx.fillStyle='#d4a72c';
    ctx.font='bold 9px -apple-system,PingFang SC,sans-serif';
    ctx.fillText(item.label,px+24,iy+8);
    ctx.fillStyle='#8b949e';
    ctx.font='8px sans-serif';
    ctx.fillText(item.desc,px+72,iy+8);
    row++;
  });

  // 状态颜色 — 单行内联色块
  if(statusItems.length>0){
    row++;
    var sepY=py+13+(row-1)*ROW_H+6;
    ctx.strokeStyle='#30363d';
    ctx.beginPath();ctx.moveTo(px+6,sepY);ctx.lineTo(px+panelW-6,sepY);ctx.stroke();
    row++;
    var sy=py+13+(row-1)*ROW_H+2;
    // 内联绘制所有状态色块
    var sx=px+6;
    statusItems.forEach(function(item,idx){
      // 色块 8x8
      ctx.fillStyle=item.color;
      ctx.beginPath();ctx.roundRect(sx,sy,8,8,2);ctx.fill();
      // 缩写标签（取前4字符）
      ctx.fillStyle='#c9d1d9';
      ctx.font='8px sans-serif';
      ctx.textAlign='left';ctx.textBaseline='middle';
      var full=item.label;
      var abbr=full.length>4?full.substring(0,4):full;
      ctx.fillText(abbr,sx+11,sy+5);
      sx+=ctx.measureText(abbr).width+18;
    });
  }
}

// ====== 交互：点击检测 ======
function hitTest(mx,my){
  for(var i=layoutNodes.length-1;i>=0;i--){
    var n=layoutNodes[i];
    if(mx>=n.x-NW/2&&mx<=n.x+NW/2&&my>=n.y-NH/2&&my<=n.y+NH/2) return n;
  }
  return null;
}

function hitPedestal(mx,my){
  var baseY=H-PED_H*treeScale;  // 底座顶部y（考虑缩放）
  var cx=W/2, mW=Math.min(400,W*0.5);
  return mx>=cx-mW*0.6&&mx<=cx+mW*0.6&&my>=baseY-15&&my<=baseY+20;
}

function hitLegendToggle(mx,my){
  var lx=10, ly=H-34, lw=48, lh=20;
  return mx>=lx&&mx<=lx+lw&&my>=ly&&my<=ly+lh;
}

// 花苞点击检测（比节点范围稍大，包含花苞区域）
function hitBud(mx,my){
  for(var i=layoutNodes.length-1;i>=0;i--){
    var n=layoutNodes[i];
    var realStatus=getEffectiveStatus(n.id);
    if(realStatus==='waiting'&&!budTransitions.find(function(t){return t.id===n.id;})){
      var budY=n.y-NH/2-22;
      var dx=mx-n.x, dy=my-budY;
      if(dx*dx+dy*dy<=20*20) return n;
    }
  }
  return null;
}

cv.addEventListener('mousemove',function(e){
  var r=cv.getBoundingClientRect();
  var mx=e.clientX-r.left, my=e.clientY-r.top;
  // 反变换坐标到树的局部坐标系
  var lx=(mx-treeOffsetX)/treeScale, ly=(my-treeOffsetY)/treeScale;
  hoveredNode=hitTest(lx,ly);
  var bud=hitBud(lx,ly);
  cv.style.cursor=hoveredNode||hitPedestal(mx,my)||hitLegendToggle(mx,my)||bud?'pointer':'default';
});

cv.addEventListener('click',function(e){
  // ====== 兜底：检测模式按钮点击（防止Canvas遮挡按钮onclick）======
  var modesBar=document.getElementById('top-modes');
  if(modesBar){
    var mbRect=modesBar.getBoundingClientRect();
    if(e.clientX>=mbRect.left&&e.clientX<=mbRect.right&&e.clientY>=mbRect.top&&e.clientY<=mbRect.bottom){
      // 点击在按钮区域内，让原生 onclick 处理，不拦截
      return;
    }
  }
  var r=cv.getBoundingClientRect();
  var mx0=e.clientX-r.left, my0=e.clientY-r.top;
  // ★ 探伤模式：InfoCard 上的「查看报告」和「定位代码」按钮 hit-test
  if(currentMode==='probe'&&probeReportBtn){
    var b=probeReportBtn;
    if(mx0>=b.x&&mx0<=b.x+b.w&&my0>=b.y&&my0<=b.y+b.h){
      exportProbeReport();
      return;
    }
  }
  if(currentMode==='probe'&&probeLocateBtn){
    var b2=probeLocateBtn;
    if(mx0>=b2.x&&mx0<=b2.x+b2.w&&my0>=b2.y&&my0<=b2.y+b2.h){
      locateCode(b2.taskId);
      return;
    }
  }

  // 调试模式下，点击更新 lastClickTime（防止超时返回演示）
  if(currentMode==='interactive') lastClickTime=now;
  var r=cv.getBoundingClientRect();
  var mx=e.clientX-r.left, my=e.clientY-r.top;
  // 反变换坐标到树的局部坐标系（用于 hitPedestal, hitBud）
  var lx=(mx-treeOffsetX)/treeScale, ly=(my-treeOffsetY)/treeScale;

  // 图例切换
  if(hitLegendToggle(mx,my)){
    if(!parentReady) currentMode=null; // 用户交互 → 暂停 demo（外部信号接入时不动模式）
    legendExpanded=!legendExpanded;
    return;
  }

  // 底座 → 切换树根
  if(hitPedestal(mx,my)){
    if(currentMode==='auto'){setMode('interactive');lastClickTime=performance.now();return;}
    if(!parentReady) currentMode=null; // 用户交互 → 暂停 demo（外部信号接入时不动模式）
    rootsExpanded=!rootsExpanded;
    return;
  }

  // 花苞 → 激活转场
  var bud=hitBud(lx,ly);
  if(bud){
    if(currentMode==='auto'){setMode('interactive');lastClickTime=performance.now();return;}
    if(!parentReady) currentMode=null; // 用户交互 → 暂停 demo（外部信号接入时不动模式）
    budTransitions.push({id:bud.id,startTime:now,duration:800});
    selectedNode=null; // 点花苞不显示InfoCard
    return;
  }

  // 节点点击 → 调试模式弹出菜单 / 其他模式选中
  var hit=hitTest(lx,ly);
  if(hit){
    // V4 postMessage：通知父窗口节点被点击
    sendNodeClick(hit.id);
    if(currentMode==='auto'){
      setMode('interactive');lastClickTime=now;selectedNode=null;
      showNodeMenu(hit, e.clientX, e.clientY);
      e.stopPropagation(); // 阻止冒泡到document（否则菜单立即被关闭）
      return;
    }
    if(currentMode==='interactive'){
      lastClickTime=now;hideNodeMenu();selectedNode=null;
      showNodeMenu(hit, e.clientX, e.clientY);
      e.stopPropagation(); // 阻止冒泡到document（否则菜单立即被关闭）
      return;
    }
    // 接入模式：树为观察器，不响应点击
    if(currentMode==='real'){return;}
    // 接入模式（外部信号已接入）：只发代码位置通知，不显示InfoCard
    if(parentReady){return;}
    currentMode=null; selectedNode=hit; return;
  }

  // InfoCard 按钮点击检测（外接信号模式不响应面板按钮，所有操作走控制面板）
  if(selectedNode && !parentReady){
    var sn=selectedNode;
    var sRealStatus=getEffectiveStatus(sn.id);
    var sLiveTask=taskById(sn.id);
    var sHasError=sRealStatus==='blocked'&&!!(sLiveTask&&sLiveTask.error);

    if(currentMode!=='interactive'){
      var infoCx=W-285, infoCy=20;

      if(sHasError){
        var btnW=90, btnH=22, btnY=infoCy+96;
        if(mx>=infoCx+14&&mx<=infoCx+14+btnW&&my>=btnY&&my<=btnY+btnH){
          menuNode=selectedNode; menuAiFix(); return;
        }
        if(mx>=infoCx+14+btnW+6&&mx<=infoCx+14+btnW+6+btnW&&my>=btnY&&my<=btnY+btnH){
          menuNode=selectedNode; menuManualFix(); return;
        }
      }

      if(sRealStatus==='done'){
        var btnW2=90, btnH2=22, btnY2=infoCy+158;
        if(mx>=infoCx+14&&mx<=infoCx+14+btnW2&&my>=btnY2&&my<=btnY2+btnH2){
          menuNode=selectedNode; menuInjectFault(); return;
        }
      }
    }
  }

  // 点击空白区域
  if(currentMode==='auto'){setMode('interactive');lastClickTime=now;return;}
  if(currentMode==='interactive'){lastClickTime=now;hideNodeMenu();return;}
  if(!parentReady) currentMode=null; selectedNode=null;
});

// ====== postMessage：接收父窗口消息 (V4) ======
window.addEventListener('message',function(event){
  // 验证 secret
  if(!event.data || event.data.secret !== SECRET){
    console.warn('[Fusang] ⚠️ Invalid secret from parent, ignoring');
    return;
  }
  // 收到合法消息 → 重置断开检测定时器 + 空闲计时器
  lastExtSignalTime=performance.now();
  if(currentMode==='real') accessModeLastActive=performance.now();
  if(parentReady){
    var dot=document.getElementById('live-connect-dot');
    if(dot) dot.className='live-dot connected';
    var txt=document.getElementById('live-connect-text');
    if(txt) txt.textContent=i18n[lang].liveConnected||'已连接';
  }

  if(event.data.type==='FUSANG_READY'){
    parentReady=true;
    lastExtSignalTime=performance.now();
    console.log('[Fusang] ✅ 外部信号已接管（最高优先权）');
    // ★ 强制接管：不管当前什么状态，外部信号一来就重置一切
    tasks.forEach(function(t){t.status='todo';t.error=null;});
    demoState=-1;demoDimOverlay=false;demoLitSet={};
    // 禁用演示/调试按钮
    var autoBtn=document.getElementById('btn-auto');
    var intBtn=document.getElementById('btn-interactive');
    [autoBtn,intBtn].forEach(function(b){
      if(b){b.disabled=true;b.style.opacity='0.3';b.style.cursor='not-allowed';b.style.color='#484f58';b.style.background='transparent';b.style.boxShadow='none';}
    });
    // 接入按钮常亮
    var realBtn=document.getElementById('btn-real');
    if(realBtn){realBtn.disabled=false;realBtn.style.cursor='default';realBtn.style.opacity='1';realBtn.style.color='#0d1117';realBtn.style.background='linear-gradient(135deg,#3fb950,#2ea043)';realBtn.style.fontWeight='bold';realBtn.style.boxShadow='0 0 12px rgba(63,185,80,0.5)';}
    // 确保面板打开
    document.getElementById('live-panel').classList.add('open');
    document.getElementById('live-handle').style.display='block';
    if(!window._liveInitialized){ initLivePanel(); }
    // ★ 触发全屏闪烁 + 光晕效果
    globalFlashStart=performance.now();
    tasks.forEach(function(t){t._haloStart=performance.now();});
    // 重置模拟开关为 OFF（外部信号接管后模拟功能让出）
    _liveSwitchOn=false;
    var swBtn=document.getElementById('live-switch-btn');
    var swTxt=document.getElementById('live-switch-text');
    if(swBtn) swBtn.className='live-switch off';
    if(swTxt) swTxt.textContent='OFF';
    enableLiveControls(false);
    // 更新连接状态灯
    var dot=document.getElementById('live-connect-dot');
    if(dot) dot.className='live-dot connected';
    var txt=document.getElementById('live-connect-text');
    if(txt) txt.textContent=i18n[lang].liveConnected||'已连接';
    // 触发全局视觉反馈
    globalFlashStart=performance.now();
    globalGlowStart=performance.now();
    currentMode='real';
    resize();
    requestAnimationFrame(draw);
    console.log('[Fusang] 🔌 外部信号已完全接管，所有节点重置为未搭建');
    return;
  }

  // V4：收到父窗口对节点点击的 ACK（清除超时定时器，防止内存泄漏）
  if(event.data.type==='FUSANG_NODE_CLICK_ACK'){
    var ackMsgId=event.data.messageId;
    if(ackMsgId && pendingAcks[ackMsgId]){
      clearTimeout(pendingAcks[ackMsgId]);
      delete pendingAcks[ackMsgId];
      console.log('[Fusang] ✅ 收到 ACK：'+ackMsgId);
    }
    return;
  }

  // V4：外部系统通知"节点已搭建完成"
  if(event.data.type==='FUSANG_BUILD_NODE'){
    var nodeId=event.data.nodeId;
    if(!nodeId){console.warn('[Fusang] ⚠️ BUILD_NODE: nodeId 为空');return;}
    var task=taskById(nodeId);
    if(!task){console.warn('[Fusang] ⚠️ BUILD_NODE: 节点不存在 '+nodeId);return;}
    // 故障节点不允许搭建，需先修复
    if(task.status==='blocked'){
      console.warn('[Fusang] ⚠️ BUILD_NODE: 节点故障中，请先修复 '+nodeId);
      return;
    }
    // 已搭建则提示，不重复操作
    if(task.status==='done'){
      console.log('[Fusang] ⚠️ BUILD_NODE: 节点已搭建，无需重复 '+nodeId);
      return;
    }
    var oldSt=task.status;
    task.status='done';task.error=null;
    sendStatusChange(nodeId,oldSt,'done');
    liveLog(i18n[lang].liveLogBuild+nodeId+' (外部信号)');
    console.log('[Fusang] 🟢 外部信号 → 搭建: '+nodeId);
    return;
  }

  if(event.data.type==='FUSANG_DISCONNECT'){
    handleDisconnect();
    return;
  }

  if(event.data.type==='FUSANG_HIGHLIGHT_NODE'){
    var node=nodeById(event.data.nodeId);
    if(node){
      // 高亮节点：闪烁金色 3 秒
      highlightNodeId=event.data.nodeId;
      highlightNodeStart=performance.now();
      console.log('[Fusang] ✨ 高亮节点：'+event.data.nodeId);
    } else {
      console.warn('[Fusang] ⚠️ 节点不存在：'+event.data.nodeId);
    }
    return;
  }

  // V4 新增：注入故障信号
  if(event.data.type==='FUSANG_INJECT_FAULT'){
    var nodeId=event.data.nodeId;
    if(!nodeId){console.warn('[Fusang] ⚠️ INJECT_FAULT: nodeId 为空');return;}
    var task=taskById(nodeId);
    if(!task){console.warn('[Fusang] ⚠️ INJECT_FAULT: 节点不存在 '+nodeId);return;}
    // 状态校验：只能对已搭建（done）节点注入故障
    if(task.status==='todo'||task.status==='waiting'){
      console.warn('[Fusang] ⛔ 节点 '+nodeId+' 未搭建，无法注入故障');
      return;
    }
    // 注入故障：只设目标节点 blocked，不 recalcAll
    // 下游等待/阻塞视觉效果由 getEffectiveStatus() 渲染时自动计算
    var oldStatus=task.status;
    task.status='blocked';
    task.error={message:{zh:event.data.errorMsg||'外部信号触发故障',en:event.data.errorMsgEn||'External fault triggered'},file:task.file||'',line:1,callChain:[]};
    sendStatusChange(nodeId, oldStatus, 'blocked');
    requestAnimationFrame(draw);
    console.log('[Fusang] 🔴 注入故障：'+nodeId);
    return;
  }

  // V4 新增：AI 修复信号
  if(event.data.type==='FUSANG_AI_FIX'){
    var nodeId=event.data.nodeId;
    if(!nodeId){console.warn('[Fusang] ⚠️ AI_FIX: nodeId 为空');return;}
    var task=taskById(nodeId);
    if(!task){console.warn('[Fusang] ⚠️ AI_FIX: 节点不存在 '+nodeId);return;}
    // 状态校验：只修复故障节点
    if(task.status!=='blocked'){
      console.warn('[Fusang] ⛔ 节点 '+nodeId+' 无故障，无需修复');
      return;
    }
    // AI 修复：只修复目标节点，不自动传导下游（接入模式=逐级操作）
    var oldStatus=task.status;
    task.status='done';
    task.error=null;
    sendStatusChange(nodeId, oldStatus, 'done');
    requestAnimationFrame(draw);
    console.log('[Fusang] 🤖 AI 修复：'+nodeId);
    return;
  }

  // V4 新增：人工修复信号
  if(event.data.type==='FUSANG_MANUAL_FIX'){
    var nodeId=event.data.nodeId;
    if(!nodeId){console.warn('[Fusang] ⚠️ MANUAL_FIX: nodeId 为空');return;}
    var task=taskById(nodeId);
    if(!task){console.warn('[Fusang] ⚠️ MANUAL_FIX: 节点不存在 '+nodeId);return;}
    // 状态校验：只修复故障节点
    if(task.status!=='blocked'){
      console.warn('[Fusang] ⛔ 节点 '+nodeId+' 无故障，无需修复');
      return;
    }
    // 人工修复：只修复目标节点，不自动传导下游
    var oldStatus=task.status;
    task.status='done';
    task.error=null;
    sendStatusChange(nodeId, oldStatus, 'done');
    requestAnimationFrame(draw);
    console.log('[Fusang] ✋ 人工修复：'+nodeId);
    return;
  }

  // V4 新增：通用设置状态信号（接通/故障/进行中/待办）
  if(event.data.type==='FUSANG_SET_STATUS'){
    var nodeId=event.data.nodeId;
    var newStatus=event.data.status;
    if(!nodeId||!newStatus){console.warn('[Fusang] ⚠️ SET_STATUS: 参数不完整');return;}
    var task=taskById(nodeId);
    if(!task){console.warn('[Fusang] ⚠️ SET_STATUS: 节点不存在 '+nodeId);return;}
    var oldStatus=task.status;
    task.status=newStatus;
    if(newStatus!=='blocked') task.error=null; else task.error=task.error||{message:{zh:'外部信号',en:'External signal'},file:task.file||'',line:1,callChain:[]};
    sendStatusChange(nodeId, oldStatus, newStatus);
    // 接入模式：不调用 recalcAll()，只操作目标节点
    // 依赖视觉效果由 getEffectiveStatus() 在渲染时自动计算
    requestAnimationFrame(draw);
    console.log('[Fusang] 📶 设置状态：'+nodeId+'→'+newStatus);
    return;
  }

  console.log('[Fusang] 📨 收到未知消息：',event.data.type);
});

// ====== 断开处理（心跳超时或主动断开）======
function handleDisconnect(){
  parentReady=false;
  lastExtSignalTime=0;
  console.log('[Fusang] 🔌 外部信号已断开，3分钟内无信号将进入演示模式');
  // 更新连接状态指示灯
  var dot=document.getElementById('live-connect-dot');
  if(dot) dot.className='live-dot disconnected';
  var txt=document.getElementById('live-connect-text');
  if(txt) txt.textContent=i18n[lang].liveDisconnected||'未连接';
  // 恢复演示/调试按钮
  var autoBtn=document.getElementById('btn-auto');
  var intBtn=document.getElementById('btn-interactive');
  [autoBtn,intBtn].forEach(function(b){
    if(b){b.disabled=false;b.style.opacity='1';b.style.cursor='pointer';b.style.color='#8b949e';b.style.background='transparent';b.style.boxShadow='none';b.onclick=function(){setMode(this.id.replace('btn-',''));};}
  });
  // 接入按钮恢复普通状态
  var realBtn=document.getElementById('btn-real');
  if(realBtn){realBtn.style.background='transparent';realBtn.style.color='#8b949e';realBtn.style.fontWeight='normal';realBtn.style.boxShadow='none';}
  // ★ 断开后进入演示模式（用户要求）
  setMode('auto');
}

// ====== 外部信号接入：锁定模式 ======
function updateModeForConnection(){
  if(!parentReady) return;
  // 切换到接入模式（不 resetToAllGreen，而是置所有节点为未开启状态）
  currentMode='real';
  modeStep=0;
  modeStartTime=performance.now();
  selectedNode=null;
  rootsExpanded=false;
  demoState=-1;
  demoDimOverlay=false;
  demoLitSet={};
  hideNodeMenu();
  cv.style.border='none';
  // 所有节点进入「未开启」待激活状态
  tasks.forEach(function(t){t.status='todo';t.error=null;});
  recalcAll();
  // 禁用演示按钮
  var autoBtn=document.getElementById('btn-auto');
  var intBtn=document.getElementById('btn-interactive');
  [autoBtn,intBtn].forEach(function(b){
    if(b){
      b.disabled=true;
      b.style.opacity='0.3';
      b.style.cursor='not-allowed';
      b.style.color='#484f58';
      b.style.background='transparent';
      b.style.boxShadow='none';
      b.onclick=function(){return false;};
    }
  });
  // 接入按钮常亮（绿色=已连接）
  var realBtn=document.getElementById('btn-real');
  if(realBtn){
    realBtn.disabled=false;
    realBtn.style.cursor='default';
    realBtn.style.opacity='1';
    realBtn.style.color='#0d1117';
    realBtn.style.background='linear-gradient(135deg,#3fb950,#2ea043)';
    realBtn.style.fontWeight='bold';
    realBtn.style.boxShadow='0 0 12px rgba(63,185,80,0.5)';
  }
  console.log('[Fusang] 🔌 外部信号接入 → 所有节点未开启，等待信号激活');
}

// ====== 模式切换 ======
function setMode(mode){
  // ★ 接入按钮开关逻辑：已在接入模式时点「接入」→ 退出
  if(mode==='real' && currentMode==='real'){
    setMode('interactive');
    return;
  }
  // 外部信号已接入时，禁止切换到演示/调试模式
  if(parentReady && mode!=='real' && mode!=='probe'){
    console.log('[Fusang] ⛔ 外部信号接入中，禁止切换到 '+mode+' 模式');
    return;
  }
  // ★ 探伤模式：保留现有树结构，启动演示或等待扫描
  if(mode==='probe'){
    demoState=-1; // 停止 auto 模式演示
    demoDimOverlay=false;
    demoLitSet={};
    hideNodeMenu();
    cv.style.border='none';
    // 启动探伤演示状态机
    probeDemoState=0;
    probeStartTime=performance.now();
    probeSkipRequested=false;
    resetToAllGreen();
    // 隐藏旧模式按钮，显示探伤专用 UI
    showProbeHTML();
    console.log('[Fusang] 🔬 探伤模式 → 启动演示');
  } else if(mode==='real'){
    // 进入接入模式前，先退出探伤模式
    if(currentMode==='probe') exitProbeMode(false);

    demoState=-1;
    demoDimOverlay=false;
    demoLitSet={};
    hideNodeMenu();
    cv.style.border='none';
    // 所有节点进入「未搭建」待激活状态（接入模式核心逻辑）
    tasks.forEach(function(t){t.status='todo';t.error=null;});
    recalcAll();
    // ★ 接入模式空闲计时器：任何操作都会重置此时间
    accessModeLastActive=performance.now();
    // ★ 最高优先权：禁用演示/调试按钮
    var autoBtn=document.getElementById('btn-auto');
    var intBtn=document.getElementById('btn-interactive');
    [autoBtn,intBtn].forEach(function(b){
      if(b){
        b.disabled=true;
        b.style.opacity='0.3';
        b.style.cursor='not-allowed';
        b.style.color='#484f58';
        b.style.background='transparent';
        b.style.boxShadow='none';
      }
    });
    // ★ 接入按钮常亮高亮
    var realBtn=document.getElementById('btn-real');
    if(realBtn){
      realBtn.disabled=false;
      realBtn.style.cursor='default';
      realBtn.style.opacity='1';
      realBtn.style.color='#0d1117';
      realBtn.style.background='linear-gradient(135deg,#3fb950,#2ea043)';
      realBtn.style.fontWeight='bold';
      realBtn.style.boxShadow='0 0 12px rgba(63,185,80,0.5)';
    }
    // 展开右侧面板
    document.getElementById('live-panel').classList.add('open');
    document.getElementById('live-handle').style.display='block';
    if(!window._liveInitialized){ initLivePanel(); }
    // 重置开关状态（每次进入接入模式都重置为 OFF）
    if(_liveSwitchOn){ _liveSwitchOn=false; }
    var swBtn=document.getElementById('live-switch-btn');
    var swTxt=document.getElementById('live-switch-text');
    if(swBtn) swBtn.className='live-switch off';
    if(swTxt) swTxt.textContent='OFF';
    setLiveConnected(false);
    // 外部信号已提前到达 → 立即显示已连接 + 触发视觉反馈
    if(parentReady){
      var dot=document.getElementById('live-connect-dot');
      if(dot) dot.className='live-dot connected';
      var txt=document.getElementById('live-connect-text');
      if(txt) txt.textContent=i18n[lang].liveConnected||'已连接';
      globalFlashStart=performance.now();
      globalGlowStart=performance.now();
    }
    enableLiveControls(false);
    resize(); // 重新计算 canvas 宽度，避免树被遮挡
    console.log('[Fusang] 🔌 接入模式 → 所有节点未搭建，等待信号激活');
  } else if(currentMode==='real') {
    // ★ 从接入模式退出：收起右侧面板 + 恢复按钮
    document.getElementById('live-panel').classList.remove('open');
    document.getElementById('live-handle').style.display='none';
    // 恢复演示/调试按钮
    var autoBtn=document.getElementById('btn-auto');
    var intBtn=document.getElementById('btn-interactive');
    [autoBtn,intBtn].forEach(function(b){
      if(b){
        b.disabled=false;
        b.style.opacity='1';
        b.style.cursor='pointer';
        b.style.color='#8b949e';
        b.style.background='transparent';
        b.style.boxShadow='none';
        b.onclick=function(){setMode(this.id.replace('btn-',''));};
      }
    });
    // 接入按钮恢复默认样式
    var realBtn=document.getElementById('btn-real');
    if(realBtn){
      realBtn.style.color='#8b949e';
      realBtn.style.background='transparent';
      realBtn.style.fontWeight='normal';
      realBtn.style.boxShadow='none';
      realBtn.style.cursor='pointer';
    }
    resize(); // 恢复 canvas 全宽
  }
  // 以下为所有模式通用的收尾逻辑
  currentMode=mode;
  modeStep=0;
  modeStartTime=performance.now();
  if(mode==='auto') demoState=0;
  selectedNode=null;
  rootsExpanded=false;
  // 模式按钮高亮
  ['btn-auto','btn-interactive','btn-real','btn-probe'].forEach(function(id){
    var b=document.getElementById(id);
    if(b) {
      if(id==='btn-'+mode){
        b.style.color='#0d1117';
        b.style.background='linear-gradient(135deg,#58a6ff,#3b82f6)';
        b.style.fontWeight='bold';
        b.style.boxShadow='0 0 8px rgba(88,166,255,0.5)';
      } else {
        b.style.color='#8b949e';
        b.style.background='transparent';
        b.style.fontWeight='normal';
        b.style.boxShadow='none';
      }
    }
  });
  // 注入故障按钮显隐
  var injectBar=document.getElementById('inject-bar');
  if(mode==='auto'){
    // 切入演示：清掉调试残留，从S0重新开始
    demoState=0;demoStartTime=performance.now();
    demoDimOverlay=false;demoLitSet={};
    resetToAllGreen();
    hideNodeMenu();
    cv.style.border='none';
  } else if(mode==='interactive'){
    // 调试优先：暂停演示状态机，全绿展示
    demoDimOverlay=false;demoLitSet={};demoState=-1;
    resetToAllGreen();
    hideNodeMenu();
    cv.style.border='2px solid #58a6ff'; // 蓝色边框 = 调试模式
    lastClickTime=performance.now(); // 重置超时计时器
  } else {
    cv.style.border='none';
  }
}

// ====== 节点操作弹出菜单 ======
var menuNode=null; // 当前菜单对应的节点

function showNodeMenu(node, screenX, screenY){
  // 探伤模式不显示调试菜单（探伤有自己的按钮）
  if(currentMode==='probe') return;
  var menu=document.getElementById('node-menu');
  if(!menu) return;
  menuNode=node;
  var task=taskById(node.id);
  var status=getEffectiveStatus(node.id);

  // 根据节点状态生成菜单项
  var html='';
  if(status!=='blocked'){
    // 正常节点（绿/紫/灰）→ 显示注入故障
    html+='<div onclick="menuInjectFault()" style="padding:8px 16px;cursor:pointer;font-size:12px;color:#f85149;display:flex;align-items:center;gap:6px;" onmouseover="this.style.background=\'rgba(248,81,73,0.1)\'" onmouseout="this.style.background=\'none\'">⚡ '+i18n[lang].infoCard.injectFault+'</div>';
  }
  if(status==='blocked'&&task&&task.error){
    // 故障节点 → 显示修复选项
    html+='<div onclick="menuAiFix()" style="padding:8px 16px;cursor:pointer;font-size:12px;color:#58a6ff;display:flex;align-items:center;gap:6px;" onmouseover="this.style.background=\'rgba(88,166,255,0.1)\'" onmouseout="this.style.background=\'none\'">🤖 AI '+i18n[lang].infoCard.aiFix+'</div>';
    html+='<div onclick="menuManualFix()" style="padding:8px 16px;cursor:pointer;font-size:12px;color:#3fb950;display:flex;align-items:center;gap:6px;" onmouseover="this.style.background=\'rgba(63,179,80,0.1)\'" onmouseout="this.style.background=\'none\'">🔧 '+i18n[lang].infoCard.manualFix+'</div>';
  }

  menu.innerHTML=html;
  menu.style.display='block';

  // 定位：确保不超出屏幕
  var mw=150, mh=html.split('</div>').length*34+12;
  var mx=screenX+8, my=screenY+8;
  if(mx+mw>window.innerWidth) mx=screenX-mw-8;
  if(my+mh>window.innerHeight) my=screenY-mh-8;
  menu.style.left=mx+'px';
  menu.style.top=my+'px';
}

function hideNodeMenu(){
  var menu=document.getElementById('node-menu');
  if(menu){menu.style.display='none';}
  menuNode=null;
}

// 菜单操作函数
function menuInjectFault(){
  if(!menuNode){console.warn('[Fusang] menuNode is null!'); return;}
  injectFault(menuNode.id);
  // 暂停演示状态机，切换到调试模式
  demoState=-1;
  demoDimOverlay=false;
  demoLitSet={};
  currentMode='interactive';
  modeStep=0;
  modeStartTime=performance.now();
  selectedNode=null;
  rootsExpanded=false;
  // 更新UI：模式按钮高亮 + 边框
  ['btn-auto','btn-interactive','btn-real'].forEach(function(id){
    var b=document.getElementById(id);
    if(b){
      if(id==='btn-interactive'){
        b.style.color='#0d1117';
        b.style.background='linear-gradient(135deg,#58a6ff,#3b82f6)';
        b.style.fontWeight='bold';
        b.style.boxShadow='0 0 8px rgba(88,166,255,0.5)';
      } else {
        b.style.color='#8b949e';
        b.style.background='transparent';
        b.style.fontWeight='normal';
        b.style.boxShadow='none';
      }
    }
  });
  document.body.classList.add('mode-interactive');
  document.body.classList.remove('mode-auto');
  var ib=document.getElementById('injectionBar');
  if(ib) ib.classList.remove('visible');
  hideNodeMenu();
}

function menuAiFix(){
  if(!menuNode)return;
  startFixAnimation(menuNode.id,'ai');
  hideNodeMenu();
}

function menuManualFix(){
  if(!menuNode)return;
  startFixAnimation(menuNode.id,'manual');
  hideNodeMenu();
}

// 点击页面其他地方关闭菜单
document.addEventListener('click',function(e){
  var menu=document.getElementById('node-menu');
  if(menu&&menu.style.display!=='none'&&!menu.contains(e.target)){
    hideNodeMenu();
    lastClickTime=performance.now(); // 关闭菜单时重置超时计时器
  }
});

function resetToAllGreen(){
  tasks.forEach(function(t){t.status='done';t.error=null;});
  recalcAll();
}

function injectRandomFault(){
  var candidates=tasks.filter(function(t){return t.id!=='goal';});
  var idx=Math.floor(Math.random()*candidates.length);
  var t=candidates[idx];
  t.status='blocked';
  t.error={message:{zh:'随机注入故障',en:'Random fault injected'},file:t.file||'',line:1,callChain:[]};
  if(currentMode==='interactive'){
    document.getElementById('btn-inject').style.display='none';
  }
}

// ====== 接入模式控制面板 ======
var _liveLogEl=null;
var _liveNodeIds=['entry','config','db','cache','api','auth','frontend','tests','ci'];
var _liveExternalActive=false;
var _liveSwitchOn=false;   // 模拟开关状态

function initLivePanel(){
  window._liveInitialized=true;
  _liveLogEl=document.getElementById('live-log');
  populateLiveNodes();
  // 初始化三段式状态栏：信号已检测到(自模拟)，开关关闭，控制面板禁用
  setLiveSignalDetected(true);
  setLiveConnected(false);
  enableLiveControls(false);
  liveLog(i18n[lang].liveLogLoaded);
  liveLog(i18n[lang].liveLogReady);
  initLiveDragHandle();
}

function populateLiveNodes(){
  var sel=document.getElementById('live-node-select');
  if(!sel) return;
  sel.innerHTML='';
  _liveNodeIds.forEach(function(id){
    var opt=document.createElement('option');
    opt.value=id;
    var task=taskById(id);
    opt.textContent=id+(task?' '+(task.label[lang]||''):'');
    sel.appendChild(opt);
  });
}

function getLiveNode(){
  var sel=document.getElementById('live-node-select');
  return sel?sel.value:'entry';
}

function liveLog(msg){
  if(!_liveLogEl) _liveLogEl=document.getElementById('live-log');
  if(!_liveLogEl) return;
  var time=new Date().toLocaleTimeString(lang==='zh'?'zh-CN':'en-US');
  _liveLogEl.innerHTML+='['+time+'] '+msg+'\n';
  _liveLogEl.scrollTop=_liveLogEl.scrollHeight;
}

function checkLiveAllowed(){
  if(_liveExternalActive){
    liveLog('🔌 '+i18n[lang].liveLogExternal);
    return false;
  }
  return true;
}

// ====== 三段式状态栏 ======
function setLiveSignalDetected(on){
  var dot=document.getElementById('live-signal-dot');
  var sw=document.getElementById('live-switch-btn');
  if(on){
    if(dot) dot.className='live-dot signal-on';
    if(sw) sw.disabled=false;
  }else{
    if(dot) dot.className='live-dot signal-off';
    if(sw){sw.disabled=true;if(_liveSwitchOn)toggleLiveSwitch();}
  }
}

function setLiveConnected(on){
  var dot=document.getElementById('live-connect-dot');
  if(dot) dot.className=on?'live-dot connected':'live-dot disconnected';
}

function toggleLiveSwitch(){
  accessModeLastActive=performance.now(); // 重置空闲计时器
  if(!_liveSwitchOn){
    // 开启模拟
    _liveSwitchOn=true;
    var btn=document.getElementById('live-switch-btn');
    var txt=document.getElementById('live-switch-text');
    if(btn) btn.className='live-switch on';
    if(txt) txt.textContent='ON';
    setLiveConnected(true);
    enableLiveControls(true);
    liveLog(i18n[lang].liveLogSwitchOn);
  }else{
    // 关闭模拟
    _liveSwitchOn=false;
    var btn=document.getElementById('live-switch-btn');
    var txt=document.getElementById('live-switch-text');
    if(btn) btn.className='live-switch off';
    if(txt) txt.textContent='OFF';
    setLiveConnected(false);
    enableLiveControls(false);
    liveLog(i18n[lang].liveLogSwitchOff);
  }
}

function enableLiveControls(on){
  var ids=['live-btn-build','live-btn-fault','live-btn-ai','live-btn-manual'];
  ids.forEach(function(id){
    var b=document.getElementById(id);
    if(!b)return;
    b.disabled=!on;
    b.style.opacity=on?'1':'0.35';
    b.style.cursor=on?'pointer':'not-allowed';
  });
}

function liveBuild(){
  accessModeLastActive=performance.now(); // 重置空闲计时器
  if(!checkLiveAllowed()) return;
  var nid=getLiveNode();
  var task=taskById(nid);
  if(!task){liveLog(i18n[lang].liveLogNodeNotFound+nid);return;}
  // 故障节点不允许搭建，需先修复
  if(task.status==='blocked'){liveLog(i18n[lang].liveLogNodeFaulted+nid);return;}
  // 已搭建节点无需重复搭建
  if(task.status==='done'){liveLog(i18n[lang].liveLogNodeAlreadyDone+nid);return;}
  // 接入模式：只搭建当前节点，不自动传导下游（逐级搭建）
  var oldSt=task.status;
  task.status='done';task.error=null;
  sendStatusChange(nid,oldSt,'done');
  liveLog(i18n[lang].liveLogBuild+nid);
  requestAnimationFrame(draw);
}

function liveFault(){
  accessModeLastActive=performance.now(); // 重置空闲计时器
  if(!checkLiveAllowed()) return;
  var nid=getLiveNode();
  var task=taskById(nid);
  if(!task){liveLog(i18n[lang].liveLogNodeNotFound+nid);return;}
  if(task.status==='todo'||task.status==='waiting'){liveLog(i18n[lang].liveLogNodeNotBuilt+nid);return;}
  var oldSt=task.status;
  task.status='blocked';
  task.error={message:{zh:'注入故障',en:'Injected fault'},file:'',line:1,callChain:[]};
  sendStatusChange(nid,oldSt,'blocked');
  // 接入模式：不调用 recalcAll()，只操作目标节点
  // 下游节点的等待/阻塞视觉效果由 getEffectiveStatus() 渲染时自动计算
  liveLog(i18n[lang].liveLogFault+nid);
  requestAnimationFrame(draw);
}

function liveAiFix(){
  accessModeLastActive=performance.now(); // 重置空闲计时器
  if(!checkLiveAllowed()) return;
  var nid=getLiveNode();
  var task=taskById(nid);
  if(!task){liveLog(i18n[lang].liveLogNodeNotFound+nid);return;}
  if(task.status!=='blocked'){liveLog(i18n[lang].liveLogNodeNotFaulty+nid);return;}
  startFixAnimation(nid,'ai');
  liveLog(i18n[lang].liveLogAiFix+nid);
}

function liveManualFix(){
  accessModeLastActive=performance.now(); // 重置空闲计时器
  if(!checkLiveAllowed()) return;
  var nid=getLiveNode();
  var task=taskById(nid);
  if(!task){liveLog(i18n[lang].liveLogNodeNotFound+nid);return;}
  if(task.status!=='blocked'){liveLog(i18n[lang].liveLogNodeNotFaulty+nid);return;}
  startFixAnimation(nid,'manual');
  liveLog(i18n[lang].liveLogManualFix+nid);
}

function liveCopyLog(){
  if(!_liveLogEl||!_liveLogEl.textContent){liveLog(i18n[lang].liveLogEmpty);return;}
  navigator.clipboard.writeText(_liveLogEl.textContent).then(function(){
    liveLog(i18n[lang].liveLogCopied+_liveLogEl.textContent.length+' chars)');
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=_liveLogEl.textContent;
    ta.style.position='fixed';ta.style.left='-9999px';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    liveLog(i18n[lang].liveLogCopiedFallback);
  });
}

function liveClearLog(){
  if(_liveLogEl) _liveLogEl.innerHTML='';
  liveLog(i18n[lang].liveLogCleared);
}

function liveToggleHelp(){
  var body=document.getElementById('live-help-body');
  var arrow=document.getElementById('live-help-arrow');
  if(body.style.display==='none'){
    body.style.display='block';arrow.textContent='▼';
  } else {
    body.style.display='none';arrow.textContent='▶';
  }
}

// 拖拽手柄
function initLiveDragHandle(){
  var handle=document.getElementById('live-handle');
  var panel=document.getElementById('live-panel');
  var dragging=false;
  handle.addEventListener('mousedown',function(e){
    e.preventDefault();dragging=true;
    handle.classList.add('dragging');
    document.body.style.cursor='col-resize';document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging) return;
    var w=document.documentElement.clientWidth-e.clientX;
    w=Math.max(200,Math.min(600,w));
    panel.style.width=w+'px';handle.style.right=w+'px';
    resize(); // 拖拽时实时重绘树
  });
  document.addEventListener('mouseup',function(){
    if(!dragging) return;
    dragging=false;handle.classList.remove('dragging');
    document.body.style.cursor='';document.body.style.userSelect='';
    resize(); // 拖拽结束最终确认
  });
}

resize();
fetchTasks();
</script>
