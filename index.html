<script>
/* ===== postMessage Protocol (V4 draft) =====
  Fusang (iframe) → Host (editor):
    FUSANG_JUMP_TO_CODE     : {file, line, column}
    FUSANG_REQUEST_AI_FIX  : {nodeId, error:{message,file,line}}
    FUSANG_NODE_STATUS_CHANGED : {nodeId, oldStatus, newStatus}
  Host → Fusang (iframe):
    FUSANG_UPDATE_NODES     : {nodes, edges, errors}
    FUSANG_AI_FIX_RESULT   : {nodeId, success, fixedCode}
*/
// ====== roundRect polyfill ======
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r);
    this.closePath();
  };
}

// ====== 调试控制台 ======
var _debugLogs=[];
var _origLog=console.log;
var _origErr=console.error;
function _addDebugLog(type,args){
  var msg=Array.prototype.slice.call(args).map(function(a){
    if(a===null) return 'null';
    if(a===undefined) return 'undefined';
    if(typeof a==='object') try{return JSON.stringify(a);}catch(e){return String(a);}
    return String(a);
  }).join(' ');
  _debugLogs.push((type==='error'?'❌ ':'')+msg);
  var el=document.getElementById('debug-log');
  if(el){el.textContent=_debugLogs.join('\n');el.scrollTop=el.scrollHeight;}
}
console.log=function(){_origLog.apply(console,arguments);_addDebugLog('log',arguments);};
console.error=function(){_origErr.apply(console,arguments);_addDebugLog('error',arguments);};
function toggleDebug(){
  var p=document.getElementById('debug-panel');
  p.style.display=p.style.display==='none'?'block':'none';
}
function copyDebugLog(){
  var el=document.getElementById('debug-log');
  if(el&&el.textContent){navigator.clipboard.writeText(el.textContent).then(function(){alert('Copied!');});}
}
function clearDebugLog(){_debugLogs=[];var el=document.getElementById('debug-log');if(el)el.textContent='';}
function checkAllStatus(){
  console.log('=== STATUS CHECK ===');
  tasks.forEach(function(t){
    var deps=edges.filter(function(e){return e.to===t.id;}).map(function(e){
      var u=taskById(e.from);
      return e.from+'('+u.status+'/'+u.error+')';
    }).join(', ');
    var eff=getEffectiveStatus(t.id);
    console.log(t.id+' | status='+t.status+' | error='+JSON.stringify(t.error)+' | deps=['+deps+'] => '+eff);
  });
}

// ====== 自动压力测试 ======
function _resetAll(){
  tasks.forEach(function(t){t.status='done';t.error=null;});
}
function _getAllEff(){
  return tasks.map(function(t){return {id:t.id,eff:getEffectiveStatus(t.id)};});
}
function _assert(testId,condition,msg){
  if(condition){console.log('  ✅ '+testId+': '+msg);}
  else{console.log('  ❌ '+testId+': '+msg);}
}
function stressTest(){
  console.log('========================================');
  console.log('🧪 AI-Fusang 逻辑压力测试');
  console.log('========================================');
  var pass=0,fail=0;
  var nodeIds=tasks.map(function(t){return t.id;});

  // === T1: 全绿开局 ===
  console.log('\n--- T1: 全绿开局 ---');
  _resetAll();
  var r1=_getAllEff();
  var allDone=r1.every(function(x){return x.eff==='done';});
  _assert('T1',allDone,'所有节点 effectiveStatus=done');
  allDone?pass++:fail++;

  // === T2: 逐节点注入故障 ===
  console.log('\n--- T2: 逐节点注入故障+验证传导 ---');
  nodeIds.forEach(function(nid){
    _resetAll();
    injectFault(nid);
    var selfEff=getEffectiveStatus(nid);
    _assert('T2-'+nid,selfEff==='blocked',nid+' 自身=blocked');
    selfEff==='blocked'?pass++:fail++;
    // 检查下游是否 waiting
    var downstream=_getDownstream(nid);
    downstream.forEach(function(did){
      var dEff=getEffectiveStatus(did);
      _assert('T2-'+nid+'→'+did,dEff==='waiting',did+' 被传导=waiting');
      dEff==='waiting'?pass++:fail++;
    });
    // 检查非下游不受影响
    var safeIds=nodeIds.filter(function(x){return x!==nid&&downstream.indexOf(x)===-1;});
    safeIds.forEach(function(sid){
      var sEff=getEffectiveStatus(sid);
      _assert('T2-safe-'+sid,sEff==='done',sid+' 不受影响=done');
      sEff==='done'?pass++:fail++;
    });
  });

  // === T3: 逐节点注入+修复 ===
  console.log('\n--- T3: 逐节点注入+修复→全绿 ---');
  nodeIds.forEach(function(nid){
    _resetAll();
    injectFault(nid);
    // 模拟修复（跳过动画，直接设状态）
    var t=taskById(nid);
    t.status='done';t.error=null;recalcAll();
    var r3=_getAllEff();
    var allGreen=r3.every(function(x){return x.eff==='done';});
    _assert('T3-'+nid,allGreen,'修复'+nid+'后全绿');
    allGreen?pass++:fail++;
  });

  // === T4: 同层双故障(db+cache) ===
  console.log('\n--- T4: 同层双故障(db+cache) ---');
  _resetAll();
  injectFault('db');injectFault('cache');
  _assert('T4-api',getEffectiveStatus('api')==='waiting','api=waiting(两个上游都坏)');
  getEffectiveStatus('api')==='waiting'?pass++:fail++;
  _assert('T4-auth',getEffectiveStatus('auth')==='waiting','auth=waiting');
  getEffectiveStatus('auth')==='waiting'?pass++:fail++;
  // 修 db → api/auth 仍然 waiting（cache 还坏）
  var dbTask=taskById('db');dbTask.status='done';dbTask.error=null;recalcAll();
  _assert('T4-partial',getEffectiveStatus('api')==='waiting','修db后api仍waiting(cache还坏)');
  getEffectiveStatus('api')==='waiting'?pass++:fail++;
  // 修 cache → 全绿
  var cacheTask=taskById('cache');cacheTask.status='done';cacheTask.error=null;recalcAll();
  var r4=_getAllEff();
  var allGreen4=r4.every(function(x){return x.eff==='done';});
  _assert('T4-full',allGreen4,'修db+cache后全绿');
  allGreen4?pass++:fail++;

  // === T5: 先修下游再修上游 ===
  console.log('\n--- T5: 先修下游(api)→上游(config)还坏→api变紫 ---');
  _resetAll();
  injectFault('config');injectFault('api');
  // 先修 api
  var apiTask=taskById('api');apiTask.status='done';apiTask.error=null;recalcAll();
  var apiEff=getEffectiveStatus('api');
  _assert('T5-api-purple',apiEff==='waiting','修api后变紫(上游config还坏)');
  apiEff==='waiting'?pass++:fail++;
  // 再修 config → 全绿
  var configTask=taskById('config');configTask.status='done';configTask.error=null;recalcAll();
  var r5=_getAllEff();
  var allGreen5=r5.every(function(x){return x.eff==='done';});
  _assert('T5-full',allGreen5,'修config后全绿');
  allGreen5?pass++:fail++;

  // === T6: 全节点故障+从上往下逐个修复 ===
  console.log('\n--- T6: 全节点故障+逐个修复 ---');
  _resetAll();
  nodeIds.forEach(function(nid){injectFault(nid);});
  var allBlocked=_getAllEff().every(function(x){return x.eff==='blocked';});
  _assert('T6-all-blocked',allBlocked,'全节点注入后全blocked');
  allBlocked?pass++:fail++;
  // 从上往下逐个修
  nodeIds.forEach(function(nid){
    var t=taskById(nid);t.status='done';t.error=null;recalcAll();
  });
  var r6=_getAllEff();
  var allGreen6=r6.every(function(x){return x.eff==='done';});
  _assert('T6-all-green',allGreen6,'逐个修完后全绿');
  allGreen6?pass++:fail++;

  // === T7: 反复注入+修复3轮 ===
  console.log('\n--- T7: 反复注入+修复3轮 ---');
  _resetAll();
  var roundOk=true;
  for(var round=0;round<3;round++){
    // 随机注入3个故障
    var shuffled=nodeIds.slice().sort(function(){return Math.random()-0.5;});
    for(var fi=0;fi<3;fi++){injectFault(shuffled[fi]);}
    // 修所有
    tasks.forEach(function(t){if(t.error){t.status='done';t.error=null;}recalcAll();});
    var r7=_getAllEff();
    var ok=r7.every(function(x){return x.eff==='done';});
    if(!ok) roundOk=false;
  }
  _assert('T7-rounds',roundOk,'3轮随机注入+修复后全绿');
  roundOk?pass++:fail++;

  // === 结果 ===
  _resetAll();
  console.log('\n========================================');
  console.log('🧪 测试完成: ✅ '+pass+' 通过, ❌ '+fail+' 失败');
  console.log('========================================');
}

function _getDownstream(nodeId){
  var result=[];
  var visited={};
  function dfs(id){
    if(visited[id]) return;
    visited[id]=true;
    edges.filter(function(e){return e.from===id;}).forEach(function(e){
      result.push(e.to);
      dfs(e.to);
    });
  }
  dfs(nodeId);
  return result;
}

// ====== 拓扑排序：获取执行顺序 ======
function getExecutionOrder(){
  var order=[];
  var visited={};
  var visiting={}; // 检测循环依赖
  var hasCycle=false;

  function visit(nodeId){
    if(visiting[nodeId]){
      console.error('[Fusang] 循环依赖检测：'+nodeId+' 正在访问中（存在环）');
      hasCycle=true;
      return;
    }
    if(visited[nodeId]) return;
    visiting[nodeId]=true;
    // 正向遍历：从当前节点出发，沿 from→to 方向访问下游
    edges.filter(function(e){return e.from===nodeId;}).forEach(function(e){
      visit(e.to);
    });
    visited[nodeId]=true;
    delete visiting[nodeId];
    order.push(nodeId);
  }

  // 从没有依赖的节点开始（根部）
  var roots=tasks.filter(function(t){return !edges.find(function(e){return e.to===t.id;});});
  roots.forEach(function(r){visit(r.id);});

  if(hasCycle){
    console.warn('[Fusang] 检测到循环依赖，执行顺序可能不正确');
  }
  return order;
}

function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  layout();
}

// ====== 布局：自底向上 ======
function layout(){
  var layers={};
  tasks.forEach(function(t){
    if(!layers[t.layer]) layers[t.layer]=[];
    layers[t.layer].push(t);
  });
  var maxL=0;
  tasks.forEach(function(t){if(t.layer>maxL)maxL=t.layer;});

  var treeBottom=H-PED_H-PAD_TOP;

  layoutNodes=tasks.map(function(t){
    var peers=layers[t.layer];
    var idx=peers.indexOf(t);
    var count=peers.length;
    var y=treeBottom-t.layer*LGAP-NH/2;
    var x;
    if(count===1) x=W/2;
    else x=PAD_X+(W-PAD_X*2)/(count-1)*idx;
    return Object.assign({},t,{x:x,y:y});
  });
}

function nodeById(id){return layoutNodes.find(function(n){return n.id===id;});}
function taskById(id){return tasks.find(function(t){return t.id===id;});}

// ====== 缓动函数 ======
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeInOut(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

// ====== 绘制主循环 ======
function draw(timestamp){
  now=timestamp||0;
  // 动态计算 treeOffsetY：让底座底部碰到🐛按钮顶部
  // 公式推导：缩放后底座底部 = treeOffsetY + H * treeScale → 目标 = H - 36
  treeOffsetY = H * (1 - treeScale) - 8;

  // 模式状态机
  if(currentMode==='auto'){
    var elapsed=now-demoStartTime;
    if(demoState===0){
      // S0: 全灰视觉覆盖（1秒）—— 不改底层status，用覆盖层变暗
      // 每帧都执行初始化（幂等操作，安全）
      demoDimOverlay=true;
      demoLitSet={};
      faultTriggered=false;fixStarted=false;fixStartTime=0;
      phase2aDone=false;phase2bDone=false;
      if(elapsed>1000){
        demoState=1;demoStartTime=now;lightIndex=-1;faultAt=-1;
        // 计算执行顺序
        executionOrder=getExecutionOrder();
        executionOrder.reverse(); // 反转：从程序入口（底）→项目完成（顶）
        // 随机选一个故障位置（包括首尾）
        faultAt=Math.floor(Math.random()*executionOrder.length);
      }
    } else if(demoState===1){
      // S1: 逐步点亮（800ms/节点）—— 遇到故障→立刻修复→继续点亮→全部绿=完成
      // 防御：确保 executionOrder 有效
      if(!executionOrder||executionOrder.length===0){
        console.warn('[Fusang Demo] S1: executionOrder 为空，重新计算');
        executionOrder=getExecutionOrder();
        if(!executionOrder||executionOrder.length===0){demoState=5;demoStartTime=now;}
      }
      var safeLen=Math.max(executionOrder.length,1);

      // 子阶段 A：正常点亮（还没到故障位置）
      if(!faultTriggered){
        var targetLight=Math.min(Math.floor(elapsed/800), safeLen-1);
        // 点亮范围不超过 faultAt（遇到故障就停）
        var maxBeforeFault=(faultAt>=0)?Math.min(targetLight,faultAt-1):targetLight;
        if(maxBeforeFault>lightIndex){
          for(var i=lightIndex+1;i<=maxBeforeFault&&i<executionOrder.length;i++){
            demoLitSet[executionOrder[i]]=true;
          }
          lightIndex=maxBeforeFault;
        }
        // 到达故障位置？
        if(faultAt>=0&&lightIndex>=faultAt-1&&!faultTriggered){
          // 点亮故障节点本身 + 注入红色
          demoLitSet[executionOrder[faultAt]]=true;
          var ft=taskById(executionOrder[faultAt]);
          if(ft){ft.status='blocked';ft.error={message:{zh:'演示故障',en:'Demo fault'},file:'',line:1,callChain:[]};recalcAll();}
          lightIndex=faultAt;
          faultTriggered=true;
          fixStartTime=now; // 记录故障注入时间
          // 等待1秒让观众看到红灯，然后自动开始修复
        }
        // 无故障情况：全部点亮完直接完成
        if(lightIndex>=safeLen-1&&(faultAt<0||faultAt>=safeLen)){
          demoDimOverlay=false;
          demoState=5;demoStartTime=now;
        }
      }

      // 子阶段 B：等待1秒展示红灯，然后自动修复
      if(faultTriggered&&!fixStarted){
        if(now-fixStartTime>1000){ // 红灯展示1秒
          var redN=tasks.find(function(t){return t.status==='blocked';});
          if(redN){startFixAnimation(redN.id,'ai');fixStarted=true;}
        }
      }

      // 子阶段 C：修复完成后继续点亮后续节点
      if(fixStarted&&fixAnimations.length===0){
        var postFixElapsed=now-(fixStartTime+1000+(fixStarted?2000:0));
        var targetLight2=Math.min(Math.floor(postFixElapsed/800)+faultAt, safeLen-1);
        if(targetLight2>lightIndex){
          for(var i=lightIndex+1;i<=targetLight2&&i<executionOrder.length;i++){
            demoLitSet[executionOrder[i]]=true;
          }
          lightIndex=targetLight2;
        }
        // 全部点亮完成！
        if(lightIndex>=safeLen-1){
          demoDimOverlay=false;
          demoState=5;demoStartTime=now;
        }
      }
    } else if(demoState===5){
      // Phase 1 完成！全绿欣赏时间（3秒）
      demoDimOverlay=false;
      if(elapsed>3000){
        demoState=6;demoStartTime=now;
        // 随机1-2个节点变红（运行时单点故障）
        var count=1+Math.floor(Math.random()*2); // 1-2
        repairQueue=[];
        for(var j=0;j<count;j++){
          var candidates=tasks.filter(function(t){return t.id!=='goal'&&repairQueue.indexOf(t.id)===-1;});
          if(candidates.length===0) break;
          var idx=Math.floor(Math.random()*candidates.length);
          var t=candidates[idx];
          t.status='blocked';t.error={message:{zh:'运行时故障',en:'Runtime fault'},file:'',line:1,callChain:[]};
          repairQueue.push(t.id);
        }
      }
    } else if(demoState===6){
      // S6: 单点故障展示（2秒让观众看清红点）
      demoDimOverlay=false;
      if(elapsed>2000){
        demoState=7;demoStartTime=now;repairIndex=0;
      }
    } else if(demoState===7){
      // S7: 逐个修复单点故障（每个修完后等一下）
      if(repairIndex<repairQueue.length){
        var rNodeId=repairQueue[repairIndex];
        var rNode=taskById(rNodeId);
        if(rNode&&rNode.status==='blocked'&&!fixAnimations.find(function(f){return f.nodeId===rNodeId;})){
          startFixAnimation(rNodeId,'ai');
          repairIndex++;
        } else if(!rNode||rNode.status!=='blocked'){
          repairIndex++;
        }
      }
      // 所有都修完了 → 等2秒展示全绿
      if(repairIndex>=repairQueue.length&&fixAnimations.length===0){
        if(!phase2aDone) phase2aDone=true;
        if(elapsed>2000||phase2aDone&&(elapsed>500)){ // 至少等2秒
          demoState=8;demoStartTime=now;
          phase2aDone=false;
          // 随机3-5个节点变红（批量多点故障）
          var count2=3+Math.floor(Math.random()*3); // 3-5
          repairQueue=[];
          for(var k=0;k<count2;k++){
            var candidates2=tasks.filter(function(t){return t.id!=='goal'&&repairQueue.indexOf(t.id)===-1;});
            if(candidates2.length===0) break;
            var idx2=Math.floor(Math.random()*candidates2.length);
            var t2=candidates2[idx2];
            t2.status='blocked';t2.error={message:{zh:'批量故障',en:'Batch fault'},file:'',line:1,callChain:[]};
            repairQueue.push(t2.id);
          }
        }
      }
    } else if(demoState===8){
      // S8: 多点故障展示（2.5秒让观众看清多个红点）
      demoDimOverlay=false;
      if(elapsed>2500){
        demoState=9;demoStartTime=now;repairIndex=0;
      }
    } else if(demoState===9){
      // S9: 逐个修复多点故障
      if(repairIndex<repairQueue.length){
        var rNodeId2=repairQueue[repairIndex];
        var rNode2=taskById(rNodeId2);
        if(rNode2&&rNode2.status==='blocked'&&!fixAnimations.find(function(f){return f.nodeId===rNodeId2;})){
          startFixAnimation(rNodeId2,'ai');
          repairIndex++;
        } else if(!rNode2||rNode2.status!=='blocked'){
          repairIndex++;
        }
      }
      // 所有都修完了 → 等3秒展示最终全绿
      if(repairIndex>=repairQueue.length&&fixAnimations.length===0){
        if(!phase2bDone) phase2bDone=true;
        if(elapsed>3000||phase2bDone&&(elapsed>500)){
          demoState=10;demoStartTime=now;
          phase2bDone=false;
        }
      }
    } else if(demoState===10){
      // S10: 最终全绿庆祝（3秒）→ 回S0循环
      demoDimOverlay=false;
      if(elapsed>3000){
        demoState=0;demoStartTime=now;
        resetToAllGreen();
      }
    }
  }

  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(treeOffsetX, treeOffsetY);
  ctx.scale(treeScale, treeScale);

  // 0. 底座
  drawPedestal();

  // 0.5 树根（展开时）
  if(rootsExpanded) drawRoots();

  // 1. 连线
  drawEdges();
  // 1.2 边级逆流粒子
  drawEdgeParticles();

  // 2. 节点
  drawNodes();

  // 2.3 盘龙（在节点上层，不被遮挡）
  drawDragon();

  // 2.5 修复庆祝动画（粒子/辉光在节点上层）
  drawFixAnimations();

  // 3. 金乌 / 花苞 / 转场动画
  drawJinwuAndBuds();

  // 4. 脉冲动画
  drawPulses();

  // 5. 树顶皇冠
  drawCrown();
  ctx.restore();

  // 6. 信息卡片
  if(selectedNode) drawInfoCard(selectedNode);

  // 7. 图例
  drawLegend();

  // 8. 标题（动态版本号，大气排版）
  ctx.fillStyle='#c9d1d9';
  ctx.font='bold 12px -apple-system,PingFang SC,sans-serif';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  var titleLine1=i18n[lang].versionTitle;
  var titleLine2=i18n[lang].title;  ctx.fillText(titleLine1, 12, 8);
  ctx.font='11px -apple-system,PingFang SC,sans-serif';
  ctx.fillText(titleLine2, 12, 26);

  // 清理过期动画
  cleanupAnimations();

  // 调试模式超时检测：3.5秒无点击 → 返回演示
  if(currentMode==='interactive' && now - lastClickTime > 8000){
    hideNodeMenu(); // 超时前先关闭菜单
    setMode('auto');
  }

  requestAnimationFrame(draw);
}

// ====== 连线绘制 ======
function drawEdges(){
  edges.forEach(function(e){
    var from=nodeById(e.from),to=nodeById(e.to);
    if(!from||!to) return;
    var fy=from.y-NH/2, ty=to.y+NH/2;
    var my=(fy+ty)/2;

    // 连线颜色：from节点状态色（淡化），堵点边红色
    var fromTask=taskById(e.from);
    var toTask=taskById(e.to);
    var edgeColor='#30363d';
    if(fromTask&&(fromTask.status==='done'||fromTask.status==='in-progress')){
      edgeColor=SC[fromTask.status]+'80';
    }
    if((fromTask&&fromTask.status==='blocked')||(toTask&&toTask.status==='blocked')){
      edgeColor='#f85149';
    }

    ctx.strokeStyle=edgeColor;
    ctx.lineWidth=((fromTask&&fromTask.status==='blocked')||(toTask&&toTask.status==='blocked'))?3:2;
    ctx.beginPath();
    ctx.moveTo(from.x,fy);
    ctx.bezierCurveTo(from.x,my,to.x,my,to.x,ty);
    ctx.stroke();

    // 箭头
    ctx.fillStyle=edgeColor;
    ctx.beginPath();
    ctx.moveTo(to.x,ty);
    ctx.lineTo(to.x-5,ty-8);
    ctx.lineTo(to.x+5,ty-8);
    ctx.closePath();
    ctx.fill();
  });
}

// ====== 边级逆流粒子 ======
function drawEdgeParticles(){
  // 维护粒子数组：自动补充新粒子（只在堵点边上）
  var blockedEdges=edges.filter(function(e){
    var fromTask=taskById(e.from),toTask=taskById(e.to);
    return (fromTask&&fromTask.status==='blocked')||(toTask&&toTask.status==='blocked');
  });
  edgeParticles=edgeParticles.filter(function(p){return p.t<1;});
  blockedEdges.forEach(function(e){
    if(!edgeParticles.some(function(p){return p.edge===e;})){
      edgeParticles.push({edge:e,t:0,speed:0.005+Math.random()*0.005});
    }
  });
  // 绘制 & 更新粒子
  edgeParticles.forEach(function(p){
    p.t+=p.speed;
    if(p.t>=1) return;
    var from=nodeById(p.edge.from),toN=nodeById(p.edge.to);
    if(!from||!toN) return;
    var fy=from.y-NH/2,ty=toN.y+NH/2,my=(fy+ty)/2;
    var posT=1-p.t; // 逆流：t=0在to，t=1在from
    var mt=1-posT;
    var x=mt*mt*mt*from.x+3*mt*mt*posT*from.x+3*mt*posT*posT*toN.x+posT*posT*posT*toN.x;
    var y=mt*mt*mt*fy+3*mt*mt*posT*my+3*mt*posT*posT*my+posT*posT*posT*ty;
    var alpha=0.5+0.5*Math.sin(p.t*Math.PI);
    ctx.fillStyle='rgba(248,81,73,'+alpha+')';
    ctx.beginPath();
    ctx.arc(x,y,2,0,Math.PI*2);
    ctx.fill();
  });
}

// ====== 节点绘制 ======
function drawNodes(){
  layoutNodes.forEach(function(n){
    var x=n.x-NW/2,y=n.y-NH/2;
    var isHover=hoveredNode&&hoveredNode.id===n.id;
    var isSel=selectedNode&&selectedNode.id===n.id;
    var realStatus=getEffectiveStatus(n.id);

    // Hover: 外发光效果
    if(isHover&&!isSel){
      ctx.save();
      ctx.shadowColor=SC[realStatus];
      ctx.shadowBlur=15;
      ctx.fillStyle='rgba(255,255,255,0.04)';
      ctx.beginPath();
      ctx.roundRect(x-2,y-2,NW+4,NH+4,10);
      ctx.fill();
      ctx.restore();
    }

    // 背景
    ctx.fillStyle=isHover?SC[realStatus]+'55':SC[realStatus]+'38';
    ctx.beginPath();
    ctx.roundRect(x,y,NW,NH,8);
    ctx.fill();

    // 边框
    ctx.strokeStyle=isHover||isSel?'#ffffff':SC[realStatus];
    ctx.lineWidth=isHover||isSel?2.5:1.5;
    if(isHover) { ctx.shadowColor='#fff'; ctx.shadowBlur=8; }
    ctx.stroke();
    ctx.shadowBlur=0; // reset shadow

    // 阻塞节点：红色边框闪烁
    if(realStatus==='blocked'){
      var flashAlpha=0.4+0.6*Math.abs(Math.sin(now/250));
      ctx.strokeStyle='rgba(248,81,73,'+flashAlpha+')';
      ctx.lineWidth=2.5+flashAlpha*2;
      ctx.stroke();
    }

    // goal 节点金色边框 + 皇冠
    if(n.isGoal){
      ctx.strokeStyle='#d4a72c';
      ctx.lineWidth=2;
      ctx.stroke();
      // 皇冠（节点上方，放大版）
      var crownY=n.y-NH/2-24;
      ctx.font='22px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('👑',n.x,crownY);
    }

    // 文字
    ctx.fillStyle='#e6edf3';
    ctx.font=(isHover||isSel?'bold ':'')+'12px -apple-system,PingFang SC,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(n.label[lang],n.x,n.y);

    // 堵点效果：红色脉冲光环 + 边框闪烁
    if(realStatus==='blocked'){
      var pulsePhase=now/300;
      var pulseAlpha=0.4+0.6*Math.abs(Math.sin(pulsePhase));
      var pulseR=Math.max(NW,NH)/2+10+pulseAlpha*22;

      // 大圈红色光晕（呼吸扩散）
      var grad=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,pulseR+18);
      grad.addColorStop(0,'rgba(248,81,73,0)');
      grad.addColorStop(0.35,'rgba(248,81,73,'+(pulseAlpha*0.5)+')');
      grad.addColorStop(0.7,'rgba(248,81,73,'+(pulseAlpha*0.15)+')');
      grad.addColorStop(1,'rgba(248,81,73,0)');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.arc(n.x,n.y,pulseR+18,0,Math.PI*2);
      ctx.fill();

      // 外圈红色脉冲环（较淡）
      ctx.strokeStyle='rgba(248,81,73,'+(pulseAlpha*0.6)+')';
      ctx.lineWidth=1.5+pulseAlpha*1.5;
      ctx.beginPath();
      ctx.arc(n.x,n.y,pulseR+6,0,Math.PI*2);
      ctx.stroke();

      // 内圈红色脉冲环（较亮）
      ctx.strokeStyle='rgba(248,81,73,'+pulseAlpha+')';
      ctx.lineWidth=2+pulseAlpha*2;
      ctx.beginPath();
      ctx.arc(n.x,n.y,pulseR-4,0,Math.PI*2);
      ctx.stroke();

      // 堵点图标背景圆
      ctx.fillStyle='rgba(248,81,73,'+(pulseAlpha*0.8)+')';
      ctx.beginPath();
      ctx.arc(n.x,n.y-NH/2-13,9,0,Math.PI*2);
      ctx.fill();
      // 堵点图标（感叹号）
      ctx.fillStyle='rgba(255,255,255,'+pulseAlpha+')';
      ctx.font='bold 13px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('!',n.x,n.y-NH/2-13);
    }

    // 演示模式覆盖层：未点亮的节点变暗
    if(demoDimOverlay&&!demoLitSet[n.id]){
      var ox=n.x-NW/2,oy=n.y-NH/2;
      ctx.fillStyle='rgba(13,17,23,0.75)'; // 暗色覆盖
      ctx.beginPath();
      ctx.roundRect(ox,oy,NW,NH,8);
      ctx.fill();
      // 文字也覆盖暗化
      ctx.fillStyle='rgba(110,118,129,0.9)';
      ctx.font='11px -apple-system,PingFang SC,sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      var oLabel=n.label?n.label[lang]||n.label.zh||n.id:n.id;
      ctx.fillText(oLabel,n.x,n.y);
    }
  });
}

// ====== 金乌 & 花苞 ======
function drawJinwuAndBuds(){
  layoutNodes.forEach(function(n){
    if(n.id==='goal') return;

    var budY=n.y-NH/2-22;
    // 从 tasks 取实时状态（layoutNodes 是 layout() 时的快照）
    var realStatus=getEffectiveStatus(n.id);

    // 检查是否有转场动画进行中
    var trans=budTransitions.find(function(t){return t.id===n.id;});

    if(trans){
      // 转场动画中
      var elapsed=now-trans.startTime;
      var progress=Math.min(1,elapsed/trans.duration);
      drawTransition(n.x,budY,12,easeInOut(progress));
      if(progress>=1&&!trans.done){
        trans.done=true;
        // 转场完成，更新状态
        var task=taskById(n.id);
        if(task) task.status='in-progress';
        // 触发脉冲
        jinwuPulses.push({id:n.id,startTime:now,x:n.x,y:budY,duration:600});
        // 同步 layoutNodes 状态
        n.status='in-progress';
      }
    } else if(realStatus==='waiting'){
      // 花苞（预留接口）
      drawBud(n.x,budY,12);
    } else if(realStatus==='done'||realStatus==='in-progress'){
      // 金乌
      var active=realStatus==='done';
      var breathe=active?1+0.08*Math.sin(now/800):1;
      drawJinwu(n.x,budY,12*breathe,active);
    }
    // todo/blocked: 无金乌无花苞
  });
}

// ====== 花苞绘制 ======
function drawBud(x,y,size){
  // 半透明花瓣，5瓣
  var petalCount=5;
  var petalSize=size*0.55;

  // 外层光晕（淡紫）
  var grad=ctx.createRadialGradient(x,y,0,x,y,size);
  grad.addColorStop(0,'rgba(188,140,255,0.15)');
  grad.addColorStop(1,'rgba(188,140,255,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.arc(x,y,size,0,Math.PI*2);
  ctx.fill();

  // 花瓣
  for(var i=0;i<petalCount;i++){
    var angle=Math.PI*2/petalCount*i-Math.PI/2;
    var px=x+Math.cos(angle)*size*0.3;
    var py=y+Math.sin(angle)*size*0.3;

    ctx.fillStyle='rgba(188,140,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(px,py,petalSize,petalSize*0.5,angle,0,Math.PI*2);
    ctx.fill();
  }

  // 花苞核心（未开放的花心）
  ctx.fillStyle='rgba(188,140,255,0.5)';
  ctx.beginPath();
  ctx.arc(x,y,size*0.25,0,Math.PI*2);
  ctx.fill();

  // "花苞" 标注
  ctx.fillStyle='rgba(188,140,255,0.6)';
  ctx.font='9px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Stub',x,y+size+8);
}

// ====== 花苞→金乌 转场动画 ======
function drawTransition(x,y,size,progress){
  // progress: 0=花苞, 1=金乌
  var ep=easeInOut(progress);

  // 花瓣消散
  if(ep<0.5){
    var petalAlpha=1-ep*2;
    var petalCount=5;
    var petalSize=size*0.55;
    var spread=size*0.3+ep*size*0.8;

    for(var i=0;i<petalCount;i++){
      var angle=Math.PI*2/petalCount*i-Math.PI/2;
      var px=x+Math.cos(angle)*spread;
      var py=y+Math.sin(angle)*spread;

      ctx.fillStyle='rgba(188,140,255,'+(petalAlpha*0.3)+')';
      ctx.beginPath();
      ctx.ellipse(px,py,petalSize*(1-ep),petalSize*0.5*(1-ep),angle,0,Math.PI*2);
      ctx.fill();
    }
  }

  // 金乌渐现
  if(ep>0.3){
    var jinwuAlpha=(ep-0.3)/0.7;
    var jinwuSize=size*(0.5+jinwuAlpha*0.5);

    // 光晕
    var grad=ctx.createRadialGradient(x,y,0,x,y,jinwuSize);
    grad.addColorStop(0,'rgba(240,208,96,'+(jinwuAlpha*0.6)+')');
    grad.addColorStop(0.5,'rgba(212,167,44,'+(jinwuAlpha*0.2)+')');
    grad.addColorStop(1,'rgba(212,167,44,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(x,y,jinwuSize,0,Math.PI*2);
    ctx.fill();

    // 核心
    ctx.fillStyle='rgba(240,208,96,'+jinwuAlpha+')';
    ctx.beginPath();
    ctx.arc(x,y,jinwuSize*0.35,0,Math.PI*2);
    ctx.fill();

    // 射线
    if(jinwuAlpha>0.5){
      var rayAlpha=(jinwuAlpha-0.5)*2;
      for(var i=0;i<8;i++){
        var a=Math.PI*2/8*i;
        ctx.strokeStyle='rgba(240,208,96,'+rayAlpha+')';
        ctx.lineWidth=1.5;
        ctx.beginPath();
        ctx.moveTo(x+Math.cos(a)*jinwuSize*0.45,y+Math.sin(a)*jinwuSize*0.45);
        ctx.lineTo(x+Math.cos(a)*jinwuSize*0.75,y+Math.sin(a)*jinwuSize*0.75);
        ctx.stroke();
      }
    }
  }

  // 中间闪光
  if(ep>0.4&&ep<0.7){
    var flashAlpha=1-Math.abs(ep-0.55)/0.15;
    flashAlpha=Math.max(0,Math.min(1,flashAlpha));
    var flashGrad=ctx.createRadialGradient(x,y,0,x,y,size*1.5);
    flashGrad.addColorStop(0,'rgba(255,255,255,'+(flashAlpha*0.4)+')');
    flashGrad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=flashGrad;
    ctx.beginPath();
    ctx.arc(x,y,size*1.5,0,Math.PI*2);
    ctx.fill();
  }
}

// ====== 金乌绘制 ======
function drawJinwu(x,y,size,active){
  var alpha=active?1:0.35;

// ====== 动态计算节点有效状态（考虑依赖链）======
// 返回: 'done'|'in-progress'|'todo'|'waiting'|'blocked'
// blocked = 自身有 error（根因）；waiting = 上游有 blocked（被传导阻塞）
function getEffectiveStatus(nodeId,visited){
  visited=visited||{};
  if(visited[nodeId]) return 'waiting';
  visited[nodeId]=true;
  var task=taskById(nodeId);
  if(!task) return 'todo';
  if(task.error) return 'blocked';
  var depEdges=edges.filter(function(e){return e.to===nodeId;});
  if(depEdges.length===0) {var s=task.status||'todo'; return s==='fixed'?'done':s;}
  var anyBlocked=false, allDone=true;
  for(var i=0;i<depEdges.length;i++){
    var depStatus=getEffectiveStatus(depEdges[i].from,Object.assign({},visited));
    if(depStatus==='blocked'){anyBlocked=true; break;}
    if(depStatus!=='done') allDone=false;
  }
  if(anyBlocked) return 'waiting';
  if(!allDone) return 'waiting';
  var s=task.status||'todo';
  return s==='fixed'?'done':s;
}

// ====== 修复庆祝动画 ======

// 修复后全量重算：暴力多轮扫描直到稳定
function recalcAll(){
  for(var iter=0;iter<20;iter++){
    var changed=false;
    tasks.forEach(function(t){
      if(t.error) return;
      if(t.status==='done') return;
      var ups=edges.filter(function(e){return e.to===t.id;});
      if(ups.length===0) return;
      var ok=ups.every(function(e){var u=taskById(e.from);return u&&u.status==='done'&&u.error==null;});
      if(ok){t.status='done';t.error=null;changed=true;}
    });
    if(!changed) break;
  }
}

function injectFault(nodeId){
  var task=taskById(nodeId);
  if(!task){console.warn('[Fusang] task not found for '+nodeId); return;}
  task.status='blocked';
  task.error={message:{zh:'注入故障：模拟错误',en:'Injected fault: simulated error'},file:task.file||'',line:1,callChain:[]};
  recalcAll();
}

function startFixAnimation(nodeId,type){
  var task=taskById(nodeId);
  if(task) task.status='fixed';
  fixAnimations.push({nodeId:nodeId,startTime:now,phase:'flash',type:type});
}

function drawFixAnimations(){
  fixAnimations=fixAnimations.filter(function(f){
    var elapsed=now-f.startTime;
    if(elapsed>2100) return false;
    if(f.phase==='flash'&&elapsed>=300){
      f.phase='glow';
      var task=taskById(f.nodeId);
      if(task&&task.status==='fixed'){task.status='done';task.error=null;recalcAll();}
    }
    if(f.phase==='glow'&&elapsed>=1100){
      f.phase='particles';
    }
    return true;
  });
  fixAnimations.forEach(function(f){
    var elapsed=now-f.startTime;
    var node=nodeById(f.nodeId);
    if(!node) return;
    if(f.phase==='flash'){
      var ep=1-elapsed/300;
      var grad=ctx.createRadialGradient(node.x,node.y,0,node.x,node.y,40+ep*30);
      grad.addColorStop(0,'rgba(255,255,255,'+(ep*0.6)+')');
      grad.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.arc(node.x,node.y,40+ep*30,0,Math.PI*2);
      ctx.fill();
    } else if(f.phase==='glow'){
      var gep=(elapsed-300)/800;
      var radius=20+gep*80;
      var alpha=1-gep*0.8;
      ctx.strokeStyle='rgba(63,185,80,'+alpha+')';
      ctx.lineWidth=2+gep*3;
      ctx.beginPath();
      ctx.arc(node.x,node.y,radius,0,Math.PI*2);
      ctx.stroke();
    } else if(f.phase==='particles'){
      var pep=(elapsed-1100)/1000;
      if(!f.particles) f.particles=[];
      while(f.particles.length<8){
        f.particles.push({x:node.x+(Math.random()-0.5)*60, y:node.y, vy:-1-Math.random()*2, life:0});
      }
      f.particles.forEach(function(p){
        p.life++;
        p.y+=p.vy;
        p.vy*=0.99;
        var pa=Math.max(0,1-p.life/60);
        ctx.fillStyle='rgba(240,208,96,'+pa+')';
        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();
      });
    }
  });
}

// ====== 盘龙：异常监控 Watchdog ======
// 龙身路径：基于节点位置计算蜿蜒曲线控制点（一直显示，故障时变红脉冲）
var dragonPathPts=[];  // [{x,y}, ...] 龙身路径采样点（用于粒子运动）

function calcDragonPath(){
  // 龙身经过每个节点附近，左右交替偏移形成盘绕效果
  var pts=[];
  // 按层分组 layoutNodes（有 x,y）
  var layers={};
  layoutNodes.forEach(function(n){
    if(!layers[n.layer]) layers[n.layer]=[];
    layers[n.layer].push(n);
  });
  var treeBottom=H-PED_H-PAD_TOP;

  // 从底座开始
  pts.push({x:W/2+30, y:treeBottom+10});

  // 逐层向上，左右交替偏移
  var maxL=0;
  layoutNodes.forEach(function(n){if(n.layer>maxL)maxL=n.layer;});
  for(var L=0;L<=maxL;L++){
    var layerNodes=layers[L];
    if(!layerNodes) continue;
    // 本层节点平均x
    var avgX=0;
    layerNodes.forEach(function(n){avgX+=n.x;});
    avgX/=layerNodes.length;
    var y=treeBottom-L*LGAP-NH/2;
    // 左右交替偏移
    var offset=((L%2===0)?1:-1)*(40+Math.min(L*5,20));
    pts.push({x:avgX+offset, y:y+NH/2+10});
    // 层间过渡点
    if(L<maxL){
      var nextY=treeBottom-(L+1)*LGAP-NH/2;
      var midY=(y+nextY)/2;
      pts.push({x:avgX+offset*0.6, y:midY});
    }
  }

  // 终点：树顶上方
  var gn=nodeById('goal');
  if(gn) pts.push({x:gn.x-20, y:gn.y-NH/2-30});

  // 采样：在控制点之间插值，生成密集路径点（供粒子使用）
  dragonPathPts=[];
  for(var i=0;i<pts.length-1;i++){
    var p0=pts[i], p1=pts[i+1];
    var steps=Math.max(4,Math.round(Math.hypot(p1.x-p0.x,p1.y-p0.y)/8));
    for(var s=0;s<=steps;s++){
      var t=s/steps;
      // 加一点正弦波动让龙身更自然
      var wave=Math.sin(t*Math.PI*2)*3;
      var perpX=-(p1.y-p0.y)/Math.hypot(p1.x-p0.x,p1.y-p0.y);
      var perpY=(p1.x-p0.x)/Math.hypot(p1.x-p0.x,p1.y-p0.y);
      dragonPathPts.push({
        x:p0.x+(p1.x-p0.x)*t+perpX*wave,
        y:p0.y+(p1.y-p0.y)*t+perpY*wave
      });
    }
  }
  return pts; // 返回控制点供绘制使用
}

function drawDragonBody(ctrlPts){
  if(ctrlPts.length<2) return;
  // 有故障时龙身变红，无故障时黄绿色
  var hasBlocked=tasks.some(function(t){return t.status==='blocked';});
  // 龙身主色
  var mainColor=hasBlocked?'rgba(200,68,68,0.85)':'rgba(120,140,60,0.7)';
  var brightColor=hasBlocked?'rgba(255,100,100,0.6)':'rgba(160,180,80,0.5)';
  var scaleColor=hasBlocked?'#a33':'#3a4a2a';

  // 龙身：粗线
  ctx.strokeStyle=mainColor;
  ctx.lineWidth=5;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(ctrlPts[0].x,ctrlPts[0].y);
  for(var i=1;i<ctrlPts.length;i++){
    ctx.lineTo(ctrlPts[i].x,ctrlPts[i].y);
  }
  ctx.stroke();

  // 龙身亮边
  ctx.strokeStyle=brightColor;
  ctx.lineWidth=2;
  ctx.stroke();

  // 鳞片：沿路径等距采样画小菱形
  if(dragonPathPts.length<2) return;
  var step=14;
  for(var i=0;i<dragonPathPts.length;i+=step){
    var pt=dragonPathPts[i];
    var angle=0;
    if(i>0&&i<dragonPathPts.length-1){
      var dx=dragonPathPts[i+1].x-dragonPathPts[i-1].x;
      var dy=dragonPathPts[i+1].y-dragonPathPts[i-1].y;
      angle=Math.atan2(dy,dx);
    }
    var ss=3;
    ctx.fillStyle=scaleColor;
    ctx.beginPath();
    ctx.moveTo(pt.x+Math.cos(angle)*ss, pt.y+Math.sin(angle)*ss);
    ctx.lineTo(pt.x+Math.cos(angle+Math.PI/2)*ss, pt.y+Math.sin(angle+Math.PI/2)*ss);
    ctx.lineTo(pt.x+Math.cos(angle+Math.PI)*ss, pt.y+Math.sin(angle+Math.PI)*ss);
    ctx.lineTo(pt.x+Math.cos(angle+3*Math.PI/2)*ss, pt.y+Math.sin(angle+3*Math.PI/2)*ss);
    ctx.closePath();
    ctx.fill();
  }
}

  var eyeColor=hasBlocked?'#ff4444':'#d4a72c';

  // 左眼

  grad.addColorStop(1,'rgba(74,90,58,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.arc(ex+5,ey,eyeR*2,0,Math.PI*2);
  ctx.fill();

  // 瞳孔
  ctx.fillStyle=hasBlocked?'#ff0000':'#8b6914';
  ctx.beginPath();
  ctx.arc(ex-5,ey,eyeR*0.5,0,Math.PI*2);
  ctx.arc(ex+5,ey,eyeR*0.5,0,Math.PI*2);
  ctx.fill();
}

function drawDragonParticles(){
  // 沿龙身路径流动的监控光点
  var N=dragonPathPts.length;
  if(N<2) return;

  // 维护粒子数组：自动补充新粒子
  dragonParticles=dragonParticles.filter(function(p){return p.t<1;});
  while(dragonParticles.length<3){
    dragonParticles.push({t:0,speed:0.002+Math.random()*0.003});
  }

  var hasBlocked=tasks.some(function(t){return t.status==='blocked';});
  dragonParticles.forEach(function(p){
    p.t+=p.speed;
    if(p.t>1) return;
    var idx=Math.floor(p.t*(N-1));
    var frac=p.t*(N-1)-idx;
    if(idx>=N-1){idx=N-2;frac=1;}
    var pt={
      x:dragonPathPts[idx].x+(dragonPathPts[idx+1].x-dragonPathPts[idx].x)*frac,
      y:dragonPathPts[idx].y+(dragonPathPts[idx+1].y-dragonPathPts[idx].y)*frac
    };
    // 检查附近是否有阻塞节点 → 粒子变红
    var nearBlocked=false;
    tasks.forEach(function(t){
      if(t.status!=='blocked') return;
      var tn=nodeById(t.id);
      if(tn&&Math.hypot(pt.x-tn.x,pt.y-tn.y)<80) nearBlocked=true;
    });

    var alpha=0.4+0.6*Math.sin(p.t*Math.PI);
    var baseColor=nearBlocked||hasBlocked?
      'rgba(255,68,68,'+alpha+')':
      'rgba(160,200,100,'+alpha+')';
    ctx.fillStyle=baseColor;
    ctx.beginPath();
    ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2);
    ctx.fill();
  });
}

function drawBlockedMarkers(){
  // 阻塞节点：红色警告标记
  tasks.forEach(function(t){
    if(t.status!=='blocked') return;
    var tn=nodeById(t.id);
    if(!tn) return;

    // 红色回旋箭头 ↩
    ctx.fillStyle='#f85149';
    ctx.font='16px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('↩', tn.x, tn.y+NH/2+14);

    // 红色脉冲环
    var pulseAlpha=0.3+0.7*Math.abs(Math.sin(now/300));
    ctx.strokeStyle='rgba(248,81,73,'+pulseAlpha+')';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(tn.x,tn.y,16+pulseAlpha*6,0,Math.PI*2);
    ctx.stroke();
  });
}

function drawDragon(){
  var ctrlPts=calcDragonPath(); // 始终计算（无故障也画）
  drawDragonBody(ctrlPts);
  drawDragonEye();
  drawDragonParticles();
  drawBlockedMarkers();
}

// ====== 信息卡片（精简版：只展示状态+问题）======
function drawInfoCard(n){
  var realStatus=getEffectiveStatus(n.id);
  var liveTask=taskById(n.id);
  var hasError=realStatus==='blocked'&&!!(liveTask&&liveTask.error);
  var cx=W-285,cy=20,cw=270,ch=hasError?130:60;
  var maxTextW=cw-28;

  ctx.fillStyle='rgba(22,27,34,0.95)';
  ctx.beginPath();
  ctx.roundRect(cx,cy,cw,ch,10);
  ctx.fill();
  ctx.strokeStyle='#30363d';
  ctx.lineWidth=1;
  ctx.stroke();

  // 标题
  ctx.fillStyle='#e6edf3';
  ctx.font='bold 14px -apple-system,PingFang SC,sans-serif';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  var title=n.label[lang];
  if(ctx.measureText(title).width>maxTextW){
    while(ctx.measureText(title+'...').width>maxTextW&&title.length>0) title=title.slice(0,-1);
    title=title+'...';
  }
  ctx.fillText(title,cx+14,cy+12);

  // 状态
  ctx.fillStyle=SC[realStatus];
  ctx.font='bold 12px sans-serif';
  ctx.fillText(i18n[lang].status[realStatus],cx+14,cy+34);

  // 错误详情（有故障时才展示）
  if(hasError){
    ctx.fillStyle='#f85149';
    ctx.font='bold 11px sans-serif';
    var errMsg=liveTask.error.message[lang];
    if(ctx.measureText(errMsg).width>maxTextW){
      while(ctx.measureText(errMsg+'...').width>maxTextW&&errMsg.length>0) errMsg=errMsg.slice(0,-1);
      errMsg=errMsg+'...';
    }
    ctx.fillText(errMsg,cx+14,cy+54);

    // 调用链
    if(liveTask.error.callChain&&liveTask.error.callChain.length>0){
      ctx.fillStyle='#8b949e';
      ctx.font='9px monospace';
      var ccStr=liveTask.error.callChain.join(' -> ');
      if(ctx.measureText(ccStr).width>maxTextW){
        while(ctx.measureText(ccStr+'...').width>maxTextW&&ccStr.length>0) ccStr=ccStr.slice(0,-1);
        ccStr=ccStr+'...';
      }
      ctx.fillText(ccStr,cx+14,cy+72);
    }

    // 操作按钮（非调试模式才画）
    if(currentMode!=='interactive'){
      var btnW=90,btnH=22,btnY=cy+96;
      ctx.fillStyle='#58a6ff';
      ctx.beginPath();
      ctx.roundRect(cx+14,btnY,btnW,btnH,4);
      ctx.fill();
      ctx.fillStyle='#fff';
      ctx.font='bold 11px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(i18n[lang].infoCard.aiFix, cx+14+btnW/2, btnY+btnH/2);
      ctx.fillStyle='#6e7681';
      ctx.beginPath();
      ctx.roundRect(cx+14+btnW+6,btnY,btnW,btnH,4);
      ctx.fill();
      ctx.fillStyle='#e6edf3';
      ctx.fillText(i18n[lang].infoCard.manualFix, cx+14+btnW+6+btnW/2, btnY+btnH/2);
    }
  }

  // 花苞节点提示
  if(realStatus==='waiting'&&!hasError){
    ctx.fillStyle='#bc8cff';
    ctx.font='10px sans-serif';
    ctx.textAlign='left';
    ctx.textBaseline='top';
    ctx.fillText(i18n[lang].infoCard.budHint, cx+14, cy+120);
  }

  // 注入故障按钮（调试模式用弹出菜单替代）
  if(realStatus==='done'&&currentMode!=='interactive'){
    var btnW=90,btnH=22,btnY=cy+158;
    ctx.fillStyle='#f85149';
    ctx.beginPath();
    ctx.roundRect(cx+14,btnY,btnW,btnH,4);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='bold 11px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(i18n[lang].infoCard.injectFault, cx+14+btnW/2, btnY+btnH/2);
  }
}

// ====== 图例面板 ======
function drawLegend(){
  // 折叠按钮
  var lbl=i18n[lang].legendBtn||'图例';
  var lx=10, ly=H-34, lw=48, lh=20;
  ctx.fillStyle='rgba(22,27,34,0.9)';
  ctx.beginPath();
  ctx.roundRect(lx,ly,lw,lh,4);
  ctx.fill();
  ctx.strokeStyle='#30363d';
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.fillStyle='#8b949e';
  ctx.font='9px sans-serif';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillText(legendExpanded?'\u2716 '+lbl:'\u2630 '+lbl,lx+5,ly+lh/2);

  if(!legendExpanded) return;

  // 展开面板 — 超紧凑
  var mainItems=i18n[lang].legendItems;
  var statusItems=i18n[lang].legendStatus||[];
  // 状态区只占1行（内联色块）
  var totalRows=mainItems.length+(statusItems.length>0?2:0); // +1 sep +1 status-line
  var ROW_H=16;
  var panelW=220, panelH=totalRows*ROW_H+12;
  var px=lx, py=ly-panelH;

  ctx.fillStyle='rgba(22,27,34,0.95)';
  ctx.beginPath();
  ctx.roundRect(px,py,panelW,panelH,6);
  ctx.fill();
  ctx.strokeStyle='#30363d';
  ctx.lineWidth=1;
  ctx.stroke();

  // 标题
  ctx.fillStyle='#e6edf3';
  ctx.font='bold 9px -apple-system,PingFang SC,sans-serif';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText(i18n[lang].legendTitle, px+6, py+3);

  var row=0;
  // 神树要件条目
  mainItems.forEach(function(item,i){
    var iy=py+13+row*ROW_H;
    ctx.font='11px sans-serif';
    ctx.textAlign='left';
    ctx.textBaseline='middle';
    ctx.fillText(item.icon,px+6,iy+8);
    ctx.fillStyle='#d4a72c';
    ctx.font='bold 9px -apple-system,PingFang SC,sans-serif';
    ctx.fillText(item.label,px+24,iy+8);
    ctx.fillStyle='#8b949e';
    ctx.font='8px sans-serif';
    ctx.fillText(item.desc,px+72,iy+8);
    row++;
  });

  // 状态颜色 — 单行内联色块
  if(statusItems.length>0){
    row++;
    var sepY=py+13+(row-1)*ROW_H+6;
    ctx.strokeStyle='#30363d';
    ctx.beginPath();ctx.moveTo(px+6,sepY);ctx.lineTo(px+panelW-6,sepY);ctx.stroke();
    row++;
    var sy=py+13+(row-1)*ROW_H+2;
    // 内联绘制所有状态色块
    var sx=px+6;
    statusItems.forEach(function(item,idx){
      // 色块 8x8
      ctx.fillStyle=item.color;
      ctx.beginPath();ctx.roundRect(sx,sy,8,8,2);ctx.fill();
      // 缩写标签（取前4字符）
      ctx.fillStyle='#c9d1d9';
      ctx.font='8px sans-serif';
      ctx.textAlign='left';ctx.textBaseline='middle';
      var full=item.label;
      var abbr=full.length>4?full.substring(0,4):full;
      ctx.fillText(abbr,sx+11,sy+5);
      sx+=ctx.measureText(abbr).width+18;
    });
  }
}

// ====== 交互：点击检测 ======
function hitTest(mx,my){
  for(var i=layoutNodes.length-1;i>=0;i--){
    var n=layoutNodes[i];
    if(mx>=n.x-NW/2&&mx<=n.x+NW/2&&my>=n.y-NH/2&&my<=n.y+NH/2) return n;
  }
  return null;
}

function hitPedestal(mx,my){
  var baseY=H-PED_H*treeScale;  // 底座顶部y（考虑缩放）
  var cx=W/2, mW=Math.min(400,W*0.5);
  return mx>=cx-mW*0.6&&mx<=cx+mW*0.6&&my>=baseY-15&&my<=baseY+20;
}

function hitLegendToggle(mx,my){
  var lx=10, ly=H-34, lw=48, lh=20;
  return mx>=lx&&mx<=lx+lw&&my>=ly&&my<=ly+lh;
}

// 花苞点击检测（比节点范围稍大，包含花苞区域）
function hitBud(mx,my){
  for(var i=layoutNodes.length-1;i>=0;i--){
    var n=layoutNodes[i];
    var realStatus=getEffectiveStatus(n.id);
    if(realStatus==='waiting'&&!budTransitions.find(function(t){return t.id===n.id;})){
      var budY=n.y-NH/2-22;
      var dx=mx-n.x, dy=my-budY;
      if(dx*dx+dy*dy<=20*20) return n;
    }
  }
  return null;
}

cv.addEventListener('mousemove',function(e){
  var r=cv.getBoundingClientRect();
  var mx=e.clientX-r.left, my=e.clientY-r.top;
  // 反变换坐标到树的局部坐标系
  var lx=(mx-treeOffsetX)/treeScale, ly=(my-treeOffsetY)/treeScale;
  hoveredNode=hitTest(lx,ly);
  var bud=hitBud(lx,ly);
  cv.style.cursor=hoveredNode||hitPedestal(mx,my)||hitLegendToggle(mx,my)||bud?'pointer':'default';
});

cv.addEventListener('click',function(e){
  // ====== 兜底：检测模式按钮点击（防止Canvas遮挡按钮onclick）======
  var modesBar=document.getElementById('top-modes');
  if(modesBar){
    var mbRect=modesBar.getBoundingClientRect();
    if(e.clientX>=mbRect.left&&e.clientX<=mbRect.right&&e.clientY>=mbRect.top&&e.clientY<=mbRect.bottom){
      // 点击在按钮区域内，让原生 onclick 处理，不拦截
      return;
    }
  }

  // 调试模式下，点击更新 lastClickTime（防止超时返回演示）
  if(currentMode==='interactive') lastClickTime=now;
  var r=cv.getBoundingClientRect();
  var mx=e.clientX-r.left, my=e.clientY-r.top;
  // 反变换坐标到树的局部坐标系（用于 hitPedestal, hitBud）
  var lx=(mx-treeOffsetX)/treeScale, ly=(my-treeOffsetY)/treeScale;

  // 图例切换
  if(hitLegendToggle(mx,my)){
    currentMode=null; // 用户交互 → 暂停 demo
    legendExpanded=!legendExpanded;
    return;
  }

  // 底座 → 切换树根
  if(hitPedestal(mx,my)){
    if(currentMode==='auto'){setMode('interactive');lastClickTime=performance.now();return;}
    currentMode=null; // 用户交互 → 暂停 demo
    rootsExpanded=!rootsExpanded;
    return;
  }

  // 花苞 → 激活转场
  var bud=hitBud(lx,ly);
  if(bud){
    if(currentMode==='auto'){setMode('interactive');lastClickTime=performance.now();return;}
    currentMode=null; // 用户交互 → 暂停 demo
    budTransitions.push({id:bud.id,startTime:now,duration:800});
    selectedNode=null; // 点花苞不显示InfoCard
    return;
  }

  // 节点点击 → 调试模式弹出菜单 / 其他模式选中
  var hit=hitTest(lx,ly);
  if(hit){
    if(currentMode==='auto'){
      setMode('interactive');lastClickTime=now;selectedNode=null;
      showNodeMenu(hit, e.clientX, e.clientY);
      e.stopPropagation(); // 阻止冒泡到document（否则菜单立即被关闭）
      return;
    }
    if(currentMode==='interactive'){
      lastClickTime=now;hideNodeMenu();selectedNode=null;
      showNodeMenu(hit, e.clientX, e.clientY);
      e.stopPropagation(); // 阻止冒泡到document（否则菜单立即被关闭）
      return;
    }
    currentMode=null; selectedNode=hit; return;
  }

  // 点击空白区域
  if(currentMode==='auto'){setMode('interactive');lastClickTime=now;return;}
  if(currentMode==='interactive'){lastClickTime=now;hideNodeMenu();return;}
  currentMode=null; selectedNode=null;
});

// ====== 模式切换 ======
function setMode(mode){
  if(mode==='real'){
    demoState=-1;
    demoDimOverlay=false;
    demoLitSet={};
    resetToAllGreen();
    hideNodeMenu();
    cv.style.border='none';
  }
  currentMode=mode;
  modeStep=0;
  modeStartTime=performance.now();
  selectedNode=null;
  rootsExpanded=false;
  // 模式按钮高亮
  ['btn-auto','btn-interactive','btn-real'].forEach(function(id){
    var b=document.getElementById(id);
    if(b) {
      if(id==='btn-'+mode){
        b.style.color='#0d1117';
        b.style.background='linear-gradient(135deg,#58a6ff,#3b82f6)';
        b.style.fontWeight='bold';
        b.style.boxShadow='0 0 8px rgba(88,166,255,0.5)';
      } else {
        b.style.color='#8b949e';
        b.style.background='transparent';
        b.style.fontWeight='normal';
        b.style.boxShadow='none';
      }
    }
  });
  // 注入故障按钮显隐
  var injectBar=document.getElementById('inject-bar');
  if(mode==='auto'){
    // 切入演示：清掉调试残留，从S0重新开始
    demoState=0;demoStartTime=performance.now();
    demoDimOverlay=false;demoLitSet={};
    resetToAllGreen();
    hideNodeMenu();
    cv.style.border='none';
  } else if(mode==='interactive'){
    // 调试优先：暂停演示状态机，全绿展示
    demoDimOverlay=false;demoLitSet={};demoState=-1;
    resetToAllGreen();
    hideNodeMenu();
    cv.style.border='2px solid #58a6ff'; // 蓝色边框 = 调试模式
    lastClickTime=performance.now(); // 重置超时计时器
  } else {
    cv.style.border='none';
  }
}

// ====== 节点操作弹出菜单 ======
var menuNode=null; // 当前菜单对应的节点

function showNodeMenu(node, screenX, screenY){
  var menu=document.getElementById('node-menu');
  if(!menu) return;
  menuNode=node;
  var task=taskById(node.id);
  var status=getEffectiveStatus(node.id);

  // 根据节点状态生成菜单项
  var html='';
  if(status!=='blocked'){
    // 正常节点（绿/紫/灰）→ 显示注入故障
    html+='<div onclick="menuInjectFault()" style="padding:8px 16px;cursor:pointer;font-size:12px;color:#f85149;display:flex;align-items:center;gap:6px;" onmouseover="this.style.background=\'rgba(248,81,73,0.1)\'" onmouseout="this.style.background=\'none\'">⚡ '+i18n[lang].infoCard.injectFault+'</div>';
  }
  if(status==='blocked'&&task&&task.error){
    // 故障节点 → 显示修复选项
    html+='<div onclick="menuAiFix()" style="padding:8px 16px;cursor:pointer;font-size:12px;color:#58a6ff;display:flex;align-items:center;gap:6px;" onmouseover="this.style.background=\'rgba(88,166,255,0.1)\'" onmouseout="this.style.background=\'none\'">🤖 AI '+i18n[lang].infoCard.aiFix+'</div>';
    html+='<div onclick="menuManualFix()" style="padding:8px 16px;cursor:pointer;font-size:12px;color:#3fb950;display:flex;align-items:center;gap:6px;" onmouseover="this.style.background=\'rgba(63,179,80,0.1)\'" onmouseout="this.style.background=\'none\'">🔧 '+i18n[lang].infoCard.manualFix+'</div>';
  }

  menu.innerHTML=html;
  menu.style.display='block';

  // 定位：确保不超出屏幕
  var mw=150, mh=html.split('</div>').length*34+12;
  var mx=screenX+8, my=screenY+8;
  if(mx+mw>window.innerWidth) mx=screenX-mw-8;
  if(my+mh>window.innerHeight) my=screenY-mh-8;
  menu.style.left=mx+'px';
  menu.style.top=my+'px';
}

function hideNodeMenu(){
  var menu=document.getElementById('node-menu');
  if(menu){menu.style.display='none';}
  menuNode=null;
}

// 菜单操作函数
function menuInjectFault(){
  if(!menuNode){console.warn('[Fusang] menuNode is null!'); return;}
  injectFault(menuNode.id);
  hideNodeMenu();
  selectedNode=null; // 注入故障后不选中节点，避免InfoCard遮挡
}

function menuAiFix(){
  if(!menuNode)return;
  startFixAnimation(menuNode.id,'ai');
  hideNodeMenu();
}

function menuManualFix(){
  if(!menuNode)return;
  startFixAnimation(menuNode.id,'manual');
  hideNodeMenu();
}

// 点击页面其他地方关闭菜单
document.addEventListener('click',function(e){
  var menu=document.getElementById('node-menu');
  if(menu&&menu.style.display!=='none'&&!menu.contains(e.target)){
    hideNodeMenu();
    lastClickTime=performance.now(); // 关闭菜单时重置超时计时器
  }
});

function resetToAllGreen(){
  tasks.forEach(function(t){t.status='done';t.error=null;});
  recalcAll();
}

function injectRandomFault(){
  var candidates=tasks.filter(function(t){return t.id!=='goal';});
  var idx=Math.floor(Math.random()*candidates.length);
  var t=candidates[idx];
  t.status='blocked';
  t.error={message:{zh:'随机注入故障',en:'Random fault injected'},file:t.file||'',line:1,callChain:[]};
  if(currentMode==='interactive'){
    document.getElementById('btn-inject').style.display='none';
  }
}

resize();
fetchTasks();
</script>
